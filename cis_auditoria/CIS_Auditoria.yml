---
- name: Auditoría CIS Benchmark (Oracle Linux / RHEL 8-9)
  hosts: OCI
  gather_facts: true
  become: true

  vars_files:
    - group_vars/all/audit_controls.yml
    - group_vars/all/exclusions.yml

  vars:

    # Detecta tipo de OS
    current_os_family: >-
      {{
        'OL' if ansible_facts.distribution == 'OracleLinux'
        else 'RHEL' if ansible_facts.distribution in ['RedHat','RedHat Enterprise Linux']
        else 'OTHER'
      }}

  tasks:

  ####################################################################
  # Inicialización
  ####################################################################

  - name: AUDIT | Inicializar lista de resultados
    ansible.builtin.set_fact:
      control_results: []

  - name: AUDIT | Obtener IP del host
    ansible.builtin.set_fact:
      audit_host_ip: >-
        {{
          hostvars[inventory_hostname].ansible_host
          | default(
              ansible_facts.default_ipv4.address
              | default(
                  ansible_facts.all_ipv4_addresses | first
                  | default(inventory_hostname)
              )
          )
        }}

  ####################################################################
  # Normalizar catálogo de controles
  ####################################################################

  - name: AUDIT | Normalizar controles CIS
    ansible.builtin.set_fact:
      normalized_controls: "{{ normalized_controls | default([]) + [ normalized_item ] }}"

    vars:

      normalized_item:

        id: "{{ item.id }}"
        name: "{{ item.name }}"

        section: >-
          {{
            item.section
            | default(
                item.id | regex_search('([0-9]+\.[0-9]+)')
              )
          }}

        category: "{{ item.category | default('General') }}"

        rationale: "{{ item.rationale | default('') }}"

        os_scope: >-
          {{
            item.os_scope
            if item.os_scope is iterable
            else item.os_scope | default('ANY') | split('/')
          }}

        command: "{{ item.command }}"
        pass_if_regex: "{{ item.pass_if_regex | default([]) }}"
        fail_if_regex: "{{ item.fail_if_regex | default([]) }}"

    loop: "{{ audit_controls }}"
    loop_control:
      label: "{{ item.id }}"

  ####################################################################
  # Filtrar controles según sistema operativo
  ####################################################################

  - name: AUDIT | Filtrar controles aplicables
    ansible.builtin.set_fact:
      applicable_controls: >-
        {{
          normalized_controls
          | selectattr('os_scope', 'contains', current_os_family)
          | list
        }}

  - name: AUDIT | Mostrar resumen
    ansible.builtin.debug:
      msg:
        - "Host: {{ inventory_hostname }}"
        - "Sistema detectado: {{ ansible_facts.distribution }}"
        - "Controles totales: {{ normalized_controls | length }}"
        - "Controles aplicables: {{ applicable_controls | length }}"

  ####################################################################
  # Ejecutar controles
  ####################################################################

  - name: AUDIT | Ejecutar controles CIS
    ansible.builtin.shell: "{{ item.command }}"   # noqa command-instead-of-shell
    args:
      executable: /bin/bash
    loop: "{{ applicable_controls }}"
    loop_control:
      label: "{{ item.id }} - {{ item.name }}"
    register: exec_results
    changed_when: false
    failed_when: false


  ####################################################################
  # Evaluar resultados
  ####################################################################

  - name: AUDIT | Evaluar resultados por control
    ansible.builtin.set_fact:

      control_results: >-
        {{
          (control_results | default([])) + [

            {
              'id': item.0.id,
              'name': item.0.name,
              'section': item.0.section,
              'category': item.0.category,
              'rationale': item.0.rationale,
              'command': item.0.command,

              'rc': item.1.rc | default(1),
              'stdout': item.1.stdout | default(''),
              'stderr': item.1.stderr | default(''),

              'status': status_result,
              'passed': passed_result,
              'evidence': evidence_result
            }

          ]
        }}

    vars:

      pairs: "{{ applicable_controls | zip(exec_results.results) | list }}"

      stdout_text: "{{ item.1.stdout | default('') | trim }}"
      stderr_text: "{{ item.1.stderr | default('') | trim }}"

      pass_match: >-
        {{
          (item.0.pass_if_regex | length > 0)
          and
          (
            stdout_text
            is search('(?m)(?:' ~ (item.0.pass_if_regex | join(')|(?:')) ~ ')')
          )
        }}

      fail_match: >-
        {{
          (item.0.fail_if_regex | length > 0)
          and
          (
            stdout_text
            is search('(?m)(?:' ~ (item.0.fail_if_regex | join(')|(?:')) ~ ')')
          )
        }}

      passed_result: >-
        {{
          (
            pass_match
            or
            (
              (item.0.pass_if_regex | length == 0)
              and (item.1.rc | default(1) == 0)
            )
          )
          and not fail_match
        }}

      status_result: >-
        {{
          'No aplicable'
          if stdout_text == 'not_applicable'
          else
          'Cumple'
          if passed_result
          else
          'No cumple'
        }}

      evidence_result: >-
        {{
          stdout_text
          if stdout_text | length > 0
          else
          (
            stderr_text
            if stderr_text | length > 0
            else
            'Sin salida; rc=' ~ (item.1.rc | default(1) | string)
          )
        }}

    loop: "{{ pairs }}"
    loop_control:
      label: "{{ item.0.id }}"


  ####################################################################
  # Guardar JSON para reporte
  ####################################################################

  - name: AUDIT | Crear carpeta de reportes
    ansible.builtin.file:
      path: "./_audit_reports"
      state: directory
      mode: "0755"
    delegate_to: localhost


  - name: AUDIT | Guardar resultados en JSON
    ansible.builtin.copy:

      content: "{{ {'host': inventory_hostname, 'ip': audit_host_ip, 'results': control_results} | to_nice_json }}"

      dest: "./_audit_reports/{{ inventory_hostname }}.json"

      mode: "0644"

    delegate_to: localhost


  ####################################################################
  # Generar Excel
  ####################################################################

  - name: AUDIT | Generar Excel
    ansible.builtin.command: >
      {{ ansible_playbook_python }} scripts/write_excel_report.py
      --input ./_audit_reports/{{ inventory_hostname }}.json
      --output ./_audit_reports/Audit_{{ audit_host_ip }}.xlsx

    delegate_to: localhost
    changed_when: false


  - name: AUDIT | Mostrar ruta del reporte
    ansible.builtin.debug:
      msg: "Reporte generado: ./_audit_reports/Audit_{{ audit_host_ip }}.xlsx"