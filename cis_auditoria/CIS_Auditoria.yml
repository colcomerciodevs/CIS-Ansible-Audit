---
- name: Auditoría CIS Benchmark (Oracle Linux / RHEL 8-9)
  hosts: AWS
  gather_facts: true
  become: true

  vars_files:
    - group_vars/all/pre_audit_controls.yml
    - group_vars/all/audit_controls.yml
    - group_vars/all/exclusions.yml
    - group_vars/all/audit_command_descriptions.yml

  vars:
    # Convierte la distribución detectada en una etiqueta simple
    # para compararla contra os_scope de cada control.
    current_os_family: >-
      {{
        'OL' if ansible_facts.distribution == 'OracleLinux'
        else 'RHEL' if ansible_facts.distribution in ['RedHat', 'RedHat Enterprise Linux']
        else 'OTHER'
      }}

  tasks:

    #####################################################################
    # AUDIT | Inicialización
    #####################################################################

    - name: AUDIT | Inicializar listas de trabajo
      ansible.builtin.set_fact:
        control_results: []
        normalized_controls: []

    - name: AUDIT | Unir controles PRE + CIS
      ansible.builtin.set_fact:
        all_audit_controls: "{{ (pre_audit_controls | default([])) + (audit_controls | default([])) }}"

    - name: AUDIT | Obtener IP del host para reportes
      ansible.builtin.set_fact:
        audit_host_ip: >-
          {{
            hostvars[inventory_hostname].ansible_host
            | default(
                ansible_facts.default_ipv4.address
                | default(
                    ansible_facts.all_ipv4_addresses | first | default(inventory_hostname)
                  )
              )
          }}

    #####################################################################
    # AUDIT | Normalizar controles
    #####################################################################

    - name: AUDIT | Normalizar catálogo de controles
      ansible.builtin.set_fact:
        normalized_controls: "{{ normalized_controls + [ normalized_item ] }}"
      vars:
        normalized_item:
          id: "{{ item.id | default('') }}"
          name: "{{ item.name | default('') }}"
          section: >-
            {{
              item.section
              | default(
                  (
                    item.id | default('')
                    | regex_search('([0-9]+\\.[0-9]+)')
                  ) | default('')
                )
            }}
          category: "{{ item.category | default('General') }}"
          rationale: "{{ item.rationale | default('') }}"
          os_scope: "{{ item.os_scope | default([]) }}"
          command: "{{ item.command | default('') }}"
          pass_if_regex: "{{ item.pass_if_regex | default([]) }}"
          fail_if_regex: "{{ item.fail_if_regex | default([]) }}"
      loop: "{{ all_audit_controls }}"
      loop_control:
        label: "{{ item.id | default('SIN-ID') }}"

    - name: AUDIT | Construir lista de controles aplicables al sistema operativo
      ansible.builtin.set_fact:
        applicable_controls: >-
          {{
            normalized_controls
            | selectattr('os_scope', 'defined')
            | selectattr('os_scope', 'contains', current_os_family)
            | list
          }}

    - name: AUDIT | Mostrar cantidad de controles aplicables
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Sistema detectado: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_major_version }}"
          - "Tipo de alcance usado: {{ current_os_family }}"
          - "Controles cargados: {{ normalized_controls | length }}"
          - "Controles aplicables: {{ applicable_controls | length }}"

    #####################################################################
    # AUDIT | Validación de descripciones
    #####################################################################

    - name: AUDIT | Identificar controles sin descripción
      ansible.builtin.set_fact:
        missing_command_descriptions: >-
          {{
            applicable_controls
            | rejectattr('id', 'in', audit_command_descriptions.keys() | list)
            | map(attribute='id')
            | list
          }}

    - name: AUDIT | Mostrar controles sin descripción registrada
      ansible.builtin.debug:
        msg:
          - "Los siguientes controles no tienen descripción en audit_command_descriptions.yml:"
          - "{{ missing_command_descriptions }}"
      when: missing_command_descriptions | length > 0

    #####################################################################
    # AUDIT | Ejecutar controles
    #####################################################################

    - name: AUDIT | Ejecutar controles CIS
      ansible.builtin.shell: "{{ item.command }}"  # noqa command-instead-of-shell
      args:
        executable: /bin/bash
      loop: "{{ applicable_controls }}"
      loop_control:
        label: "{{ item.id }}: {{ item.name }}"
      register: exec_all_results
      changed_when: false
      failed_when: false

    #####################################################################
    # AUDIT | Evaluar resultados
    #####################################################################

    - name: AUDIT | Evaluar resultados por control
      ansible.builtin.set_fact:
        control_results: >-
          {{
            control_results + [
              {
                'id': (item.0.id | default('')),
                'name': (item.0.name | default('')),
                'section': (item.0.section | default('')),
                'category': (item.0.category | default('')),
                'rationale': (item.0.rationale | default('')),
                'command': (item.0.command | default('')),
                'explicacion_comando': (
                  audit_command_descriptions[item.0.id]
                  | default('Sin descripción registrada')
                ),
                'os_scope': (item.0.os_scope | default([])),
                'rc': (item.1.rc | default(1)),
                'stdout': (item.1.stdout | default('')),
                'stderr': (item.1.stderr | default('')),
                'passed': passed_result,
                'status': status_result,
                'evidence': evidence_result,
                'exclusions': exclusions_result
              }
            ]
          }}
      vars:
        stdout_text: "{{ item.1.stdout | default('') | trim }}"
        stderr_text: "{{ item.1.stderr | default('') | trim }}"

        pass_match: >-
          {{
            (item.0.pass_if_regex | default([]) | length) > 0
            and
            (
              (item.1.stdout | default(''))
              is search(
                '(?m)(?:' ~ (item.0.pass_if_regex | join(')|(?:')) ~ ')'
              )
            )
          }}

        fail_match: >-
          {{
            (item.0.fail_if_regex | default([]) | length) > 0
            and
            (
              (item.1.stdout | default(''))
              is search(
                '(?m)(?:' ~ (item.0.fail_if_regex | join(')|(?:')) ~ ')'
              )
            )
          }}

        passed_result: >-
          {{
            (
              pass_match
              or
              (
                (item.0.pass_if_regex | default([]) | length) == 0
                and ((item.1.rc | default(1)) == 0)
              )
            )
            and not fail_match
          }}

        status_result: >-
          {{
            'No aplicable'
            if stdout_text == 'not_applicable'
            else 'Cumple'
            if passed_result
            else 'No cumple'
          }}

        evidence_result: >-
          {{
            (stdout_text | regex_replace('\n+', ' | '))
            if (stdout_text | length > 0)
            else (
              (stderr_text | regex_replace('\n+', ' | '))
              if (stderr_text | length > 0)
              else 'Sin salida; rc=' ~ (item.1.rc | default(1) | string)
            )
          }}

        exclusions_result: >-
          {{
            (
              stdout_text
              | regex_replace('(?s).*exclusions=([^|]*).*', '\1')
              | trim
            )
            if (
              item.0.id in ['CIS-5.1.8', 'CIS-5.1.9', 'CIS-5.2.4', 'CIS-5.2.7', 'CIS-5.5.6', 'CIS-5.5.10']
              and 'exclusions=' in stdout_text
            )
            else ''
          }}
      loop: "{{ applicable_controls | zip(exec_all_results.results | default([])) | list }}"
      loop_control:
        label: "{{ item.0.id }}: {{ item.0.name }}"

    #####################################################################
    # AUDIT | Resumen final
    #####################################################################

    - name: AUDIT | Mostrar resumen de auditoría
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "IP: {{ audit_host_ip }}"
          - "Total controles: {{ control_results | length }}"
          - "Cumplen: {{ control_results | selectattr('status', 'equalto', 'Cumple') | list | length }}"
          - "No cumplen: {{ control_results | selectattr('status', 'equalto', 'No cumple') | list | length }}"
          - "No aplicables: {{ control_results | selectattr('status', 'equalto', 'No aplicable') | list | length }}"
          - "Sin descripción: {{ missing_command_descriptions | length }}"

    #####################################################################
    # REPORT | Crear salida JSON local
    #####################################################################

    - name: REPORT | Crear carpeta local para reportes
      ansible.builtin.file:
        path: "./_audit_reports"
        state: directory
        mode: "0755"
      delegate_to: localhost

    - name: REPORT | Escribir JSON con resultados
      ansible.builtin.copy:
        content: >-
          {{
            {
              'host': inventory_hostname,
              'ip': audit_host_ip,
              'distribution': ansible_facts.distribution,
              'distribution_major_version': ansible_facts.distribution_major_version,
              'results': control_results
            } | to_nice_json
          }}
        dest: "./_audit_reports/{{ inventory_hostname }}.json"
        mode: "0644"
      delegate_to: localhost

    #####################################################################
    # REPORT | Generar Excel
    #####################################################################

    - name: REPORT | Generar Excel por host
      ansible.builtin.command: >
        {{ ansible_playbook_python }} ./scripts/write_excel_report.py
        --input ./_audit_reports/{{ inventory_hostname }}.json
        --output ./_audit_reports/Audit_{{ inventory_hostname }}_{{ audit_host_ip }}.xlsx
      delegate_to: localhost
      changed_when: false

    - name: REPORT | Mostrar ubicación del reporte
      ansible.builtin.debug:
        msg: "Reporte generado: ./_audit_reports/Audit_{{ inventory_hostname }}_{{ audit_host_ip }}.xlsx"