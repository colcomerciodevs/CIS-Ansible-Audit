---
# ============================================================================
# Catálogo de controles CIS para Oracle Linux / RHEL 8-9
# ============================================================================
#
# Estructura de cada control:
#
# - id:
#     Identificador del control CIS
#
# - name:
#     Descripción corta del control
#
# - section:
#     Sección CIS, útil para reporte
#
# - category:
#     Categoría funcional, útil para Excel
#
# - os_scope:
#     Lista de sistemas operativos a los que aplica el control
#     Valores sugeridos:
#       - RHEL
#       - OL
#       - SLES
#
# - use_shell:
#     true  => si requiere shell, pipes, grep, awk, bash -lc, etc.
#     false => si puede ejecutarse como comando simple
#
# - command:
#     Comando exacto de validación
#
# - pass_if_regex:
#     Lista de patrones que indican cumplimiento
#     Si está vacía, el playbook usa rc == 0
#
# - fail_if_regex:
#     Lista de patrones que indican incumplimiento
#
# - rationale:
#     Explicación opcional del control
#
# Recomendación:
# Procura que los comandos devuelvan salidas sencillas como:
# - ok
# - bad
# - present
# - absent
# - blocked
# - loaded
# - not_applicable
# ============================================================================

audit_controls:

  ######################################################################
  # Sección 1.1 - Configuración del Sistema de Archivos
  ######################################################################

  - id: "CIS-1.1.1"
    name: "Deshabilitar cramfs"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc '
        if modprobe -n -v cramfs 2>/dev/null | grep -Eq "^\s*install\s+/bin/(false|true)\b"; then
          echo blocked; exit 0;
        fi
        if lsmod | awk "{print \$1}" | grep -qx cramfs; then
          echo loaded; exit 1;
        fi
        if modinfo -n cramfs >/dev/null 2>&1; then
          echo available; exit 1;
        else
          echo absent; exit 0;
        fi'
    pass_if_regex:
      - "^blocked$"
      - "^absent$"
    fail_if_regex:
      - "^loaded$"
      - "^available$"
    rationale: "El módulo cramfs no debe estar disponible ni cargado."

  - id: "CIS-1.1.2"
    name: "Deshabilitar squashfs"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc '
        if modprobe -n -v squashfs 2>/dev/null | grep -Eq "^\s*install\s+/bin/(false|true)\b"; then
          echo blocked; exit 0;
        fi
        if lsmod | awk "{print \$1}" | grep -qx squashfs; then
          echo loaded; exit 1;
        fi
        if modinfo -n squashfs >/dev/null 2>&1; then
          echo available; exit 1;
        else
          echo absent; exit 0;
        fi'
    pass_if_regex:
      - "^blocked$"
      - "^absent$"
    fail_if_regex:
      - "^loaded$"
      - "^available$"

  - id: "CIS-1.1.3"
    name: "Deshabilitar udf"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc '
        if modprobe -n -v udf 2>/dev/null | grep -Eq "^\s*install\s+/bin/(false|true)\b"; then
          echo blocked; exit 0;
        fi
        if lsmod | awk "{print \$1}" | grep -qx udf; then
          echo loaded; exit 1;
        fi
        if modinfo -n udf >/dev/null 2>&1; then
          echo available; exit 1;
        else
          echo absent; exit 0;
        fi'
    pass_if_regex:
      - "^blocked$"
      - "^absent$"
    fail_if_regex:
      - "^loaded$"
      - "^available$"

  - id: "CIS-1.1.4"
    name: "No permitir vfat en /etc/fstab"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      grep -Ei '\svfat\s' /etc/fstab >/dev/null 2>&1 && echo present || echo absent
    pass_if_regex:
      - "^absent$"
    fail_if_regex:
      - "^present$"

  - id: "CIS-1.1.5"
    name: "/tmp en partición separada (montado)"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: false
    command: "findmnt --kernel /tmp"
    pass_if_regex: []
    fail_if_regex: []

  - id: "CIS-1.1.6"
    name: "/tmp con nodev"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: "findmnt -no OPTIONS /tmp | tr ',' '\n' | grep -Fx nodev"
    pass_if_regex: []
    fail_if_regex: []

  - id: "CIS-1.1.7"
    name: "/tmp con nosuid"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: "findmnt -no OPTIONS /tmp | tr ',' '\n' | grep -Fx nosuid"
    pass_if_regex: []
    fail_if_regex: []

  - id: "CIS-1.1.8"
    name: "/tmp con noexec"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: "findmnt -no OPTIONS /tmp | tr ',' '\n' | grep -Fx noexec"
    pass_if_regex: []
    fail_if_regex: []

  - id: "CIS-1.1.16"
    name: "/var con noexec (no aplicable en RHEL/OL)"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: "bash -lc 'echo not_applicable'"
    pass_if_regex:
      - "^not_applicable$"
    fail_if_regex: []

  - id: "CIS-1.1.37"
    name: "Sin directorios world-writable sin sticky bit"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      sh -c "if df --local -P | awk 'NR!=1 {print $6}' | xargs -I '{}' find '{}' -xdev -type d -perm -0002 ! -perm -1000 2>/dev/null | grep -q .; then exit 1; fi"
    pass_if_regex: []
    fail_if_regex: []

  - id: "CIS-1.1.38"
    name: "autofs deshabilitado/enmascarado"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc 'if systemctl list-unit-files --type=service | awk "{print \$1}" | grep -qx autofs.service; then
        systemctl is-enabled autofs || true;
      else
        echo not-installed;
      fi'
    pass_if_regex:
      - "^disabled$"
      - "^masked$"
      - "^not-installed$"
    fail_if_regex: []

  - id: "CIS-1.1.39"
    name: "usb-storage no cargado"
    section: "1.1"
    category: "Filesystem Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc 'if lsmod | awk "{print \$1}" | grep -qx usb_storage; then echo loaded; exit 1; else echo not-loaded; fi'
    pass_if_regex:
      - "^not-loaded$"
    fail_if_regex:
      - "^loaded$"

  ######################################################################
  # Sección 1.7 - Banners de advertencia
  ######################################################################

  - id: "CIS-1.7.1"
    name: "/etc/motd presente con contenido"
    section: "1.7"
    category: "Warning Banners"
    os_scope:
      - RHEL
      - OL
    use_shell: false
    command: "test -s /etc/motd"
    pass_if_regex: []
    fail_if_regex: []

  - id: "CIS-1.7.2"
    name: "/etc/issue presente con contenido"
    section: "1.7"
    category: "Warning Banners"
    os_scope:
      - RHEL
      - OL
    use_shell: false
    command: "test -s /etc/issue"
    pass_if_regex: []
    fail_if_regex: []

  - id: "CIS-1.7.3"
    name: "/etc/issue.net presente con contenido"
    section: "1.7"
    category: "Warning Banners"
    os_scope:
      - RHEL
      - OL
    use_shell: false
    command: "test -s /etc/issue.net"
    pass_if_regex: []
    fail_if_regex: []

  ######################################################################
  # Sección 2.1 - Servicios de propósito especial
  ######################################################################

  - id: "CIS-2.1.1"
    name: "chrony instalado"
    section: "2.1"
    category: "Special Purpose Services"
    os_scope:
      - RHEL
      - OL
    use_shell: false
    command: "rpm -q chrony"
    pass_if_regex: []
    fail_if_regex: []

  - id: "CIS-2.1.2"
    name: "ntp/ntpdate no instalados"
    section: "2.1"
    category: "Special Purpose Services"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: "rpm -q ntp ntpdate >/dev/null 2>&1 && echo present || echo absent"
    pass_if_regex:
      - "^absent$"
    fail_if_regex:
      - "^present$"

  - id: "CIS-2.1.7"
    name: "CUPS no instalado"
    section: "2.1"
    category: "Special Purpose Services"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: "rpm -q cups >/dev/null 2>&1 && echo present || echo absent"
    pass_if_regex:
      - "^absent$"
    fail_if_regex:
      - "^present$"

  - id: "CIS-2.1.20"
    name: "SMTP no expuesto (solo loopback)"
    section: "2.1"
    category: "Special Purpose Services"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      sh -c "if ss -H -lntu | awk '\$5 ~ /:25$/' | grep -E -v '(^127\.0\.0\.1:25$|^\[::1\]:25$)' | grep -q .; then echo open; else echo closed; fi"
    pass_if_regex:
      - "^closed$"
    fail_if_regex:
      - "^open$"

  ######################################################################
  # Sección 3.3 - Parámetros de Red
  ######################################################################

  - id: "CIS-3.3.1"
    name: "accept_source_route deshabilitado (all/default)"
    section: "3.3"
    category: "Network Parameters"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc 'a=$(sysctl -n net.ipv4.conf.all.accept_source_route 2>/dev/null || echo);
                d=$(sysctl -n net.ipv4.conf.default.accept_source_route 2>/dev/null || echo);
                if [[ "$a" == "0" && "$d" == "0" ]]; then echo ok; exit 0; fi;
                grep -RqsE "^\s*net\.ipv4\.conf\.(all|default)\.accept_source_route\s*=\s*0\b" /etc/sysctl.conf /etc/sysctl.d && { echo ok; exit 0; };
                echo bad; exit 1'
    pass_if_regex:
      - "^ok$"
    fail_if_regex:
      - "^bad$"

  - id: "CIS-3.3.8"
    name: "tcp_syncookies habilitado"
    section: "3.3"
    category: "Network Parameters"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc 'v=$(sysctl -n net.ipv4.tcp_syncookies 2>/dev/null || echo);
                if [[ "$v" == "1" ]]; then echo ok; exit 0; fi;
                grep -RqsE "^\s*net\.ipv4\.tcp_syncookies\s*=\s*1\b" /etc/sysctl.conf /etc/sysctl.d && { echo ok; exit 0; };
                echo bad; exit 1'
    pass_if_regex:
      - "^ok$"
    fail_if_regex:
      - "^bad$"

  - id: "CIS-3.3.9"
    name: "IPv6 accept_ra deshabilitado (all/default)"
    section: "3.3"
    category: "Network Parameters"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc 'ca=$(sysctl -n net.ipv6.conf.all.accept_ra 2>/dev/null || echo);
        cd=$(sysctl -n net.ipv6.conf.default.accept_ra 2>/dev/null || echo);
        if [[ "$ca" == "0" && "$cd" == "0" ]]; then echo "accept_ra disabled"; exit 0; fi;
        if grep -RqsE "^\s*net\.ipv6\.conf\.(all|default)\.accept_ra\s*=\s*0" /etc/sysctl.conf /etc/sysctl.d 2>/dev/null; then
          echo "accept_ra disabled"; exit 0; fi;
        echo "accept_ra not disabled"; exit 1'
    pass_if_regex:
      - "^accept_ra disabled$"
    fail_if_regex:
      - "^accept_ra not disabled$"

  ######################################################################
  # Sección 5.2 - Configurar SUDO
  ######################################################################

  - id: "CIS-5.2.1"
    name: "sudo instalado"
    section: "5.2"
    category: "Sudo Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: false
    command: "rpm -q sudo"
    pass_if_regex: []
    fail_if_regex: []

  - id: "CIS-5.2.2"
    name: "Defaults use_pty habilitado en sudoers"
    section: "5.2"
    category: "Sudo Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc 'grep -rPi "^[[:space:]]*Defaults[[:space:]]+([^#\n\r]+,)?use_pty(,[[:space:]]*\S+)*[[:space:]]*(#.*)?$" /etc/sudoers* 2>/dev/null || true'
    pass_if_regex:
      - "use_pty"
    fail_if_regex: []

  - id: "CIS-5.2.3"
    name: "logfile definido en sudoers"
    section: "5.2"
    category: "Sudo Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc "grep -rPsi \"^[[:space:]]*Defaults[[:space:]]+([^#]+,[[:space:]]*)?logfile[[:space:]]*=[[:space:]]*([^[:space:],#]+)(,[[:space:]]*\\S+)*[[:space:]]*(#.*)?$\" /etc/sudoers* 2>/dev/null || true"
    pass_if_regex:
      - "logfile"
    fail_if_regex: []

  - id: "CIS-5.2.4"
    name: "Prohibir NOPASSWD en sudoers (excluyendo usuarios permitidos)"
    section: "5.2"
    category: "Sudo Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc '
        out=$(grep -RIP "^[[:space:]]*[^#].*NOPASSWD" /etc/sudoers /etc/sudoers.d 2>/dev/null || true);
        echo "$out" |
          awk -F"[[:space:]]+" '"'"'{u=$1; n=split(u,a,","); ex=0;
            for(i=1;i<=n;i++){ if (a[i] ~ /^({{ excluded_users_regex }})$/) ex=1 }
            if(!ex) print }'"'"' |
          grep -q . &&
          { echo found; exit 1; } || { echo none; exit 0; }'
    pass_if_regex:
      - "^none$"
    fail_if_regex:
      - "^found$"

  ######################################################################
  # Sección 5.3 - Configurar SSH
  ######################################################################

  - id: "CIS-5.3.5"
    name: "LogLevel INFO o VERBOSE"
    section: "5.3"
    category: "SSH Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: "sshd -T | grep -E '^loglevel (INFO|VERBOSE)$'"
    pass_if_regex:
      - "^loglevel (INFO|VERBOSE)$"
    fail_if_regex: []

  - id: "CIS-5.3.10"
    name: "PermitRootLogin no/prohibit-password"
    section: "5.3"
    category: "SSH Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: "sshd -T | grep -E '^permitrootlogin (no|prohibit-password)$'"
    pass_if_regex:
      - "^permitrootlogin (no|prohibit-password)$"
    fail_if_regex: []

  - id: "CIS-5.3.15"
    name: "Banner configurado (no 'none')"
    section: "5.3"
    category: "SSH Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc '
        host="$(hostname)";
        ip="$(getent hosts "$host" | awk "NR==1{print \$1}")";
        sshd -T -C user=root -C host="$host" -C addr="$ip" 2>/dev/null |
        awk '\''$1=="banner" && $2!="none"{print $2}'\'' || true
      '
    pass_if_regex:
      - "^/"
    fail_if_regex: []

  - id: "CIS-5.3.16"
    name: "SSH UsePAM habilitado"
    section: "5.3"
    category: "SSH Configuration"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: "sshd -T | grep -E '^usepam yes$'"
    pass_if_regex:
      - "^usepam yes$"
    fail_if_regex: []

  ######################################################################
  # Sección 5.5 - Entorno y cuentas de usuario
  ######################################################################

  - id: "CIS-5.5.1"
    name: "PASS_MAX_DAYS <= 365"
    section: "5.5"
    category: "User Accounts and Environment"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      awk '/^[[:space:]]*PASS_MAX_DAYS[[:space:]]+/ {v=$2}
          END{ if(v!="" && v<=365) {print "ok"} else {print "bad"; exit 1} }' /etc/login.defs
    pass_if_regex:
      - "^ok$"
    fail_if_regex:
      - "^bad$"

  - id: "CIS-5.5.2"
    name: "PASS_MIN_DAYS >= 1"
    section: "5.5"
    category: "User Accounts and Environment"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      awk '/^[[:space:]]*PASS_MIN_DAYS[[:space:]]+/ {v=$2}
          END{ if(v!="" && v>=1) {print "ok"} else {print "bad"; exit 1} }' /etc/login.defs
    pass_if_regex:
      - "^ok$"
    fail_if_regex:
      - "^bad$"

  - id: "CIS-5.5.3"
    name: "PASS_WARN_AGE >= 7"
    section: "5.5"
    category: "User Accounts and Environment"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      awk '/^[[:space:]]*PASS_WARN_AGE[[:space:]]+/ {v=$2}
          END{ if(v!="" && v>=7) {print "ok"} else {print "bad"; exit 1} }' /etc/login.defs
    pass_if_regex:
      - "^ok$"
    fail_if_regex:
      - "^bad$"

  - id: "CIS-5.5.4"
    name: "INACTIVE <= 30 (>=0)"
    section: "5.5"
    category: "User Accounts and Environment"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      sh -lc 'i=$(useradd -D | awk -F= "/^INACTIVE=/{print \$2}");
              if [ -n "$i" ] && [ "$i" -le 30 ] && [ "$i" -ge 0 ]; then echo ok; else echo bad; exit 1; fi'
    pass_if_regex:
      - "^ok$"
    fail_if_regex:
      - "^bad$"

  - id: "CIS-5.5.5"
    name: "Sin cambios de contraseña fechados en el futuro"
    section: "5.5"
    category: "User Accounts and Environment"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc '
        bad=0
        mapfile -t USERS < <(
          awk -F: "(\$2 !~ /^[!*]/){print \$1}" /etc/shadow 2>/dev/null |
          grep -Ev "^({{ excluded_users_regex }})$" || true
        )

        for u in "${USERS[@]}"; do
          [ -z "$u" ] && continue
          d=$(chage --list "$u" 2>/dev/null | awk -F": " "/^Last password change/{print \$2}")
          [ "$d" = "never" ] || [ -z "$d" ] && continue
          ts=$(date -d "$d" +%s 2>/dev/null) || ts=0
          now=$(date +%s)
          if [ "$ts" -gt "$now" ]; then
            echo "future:$u"
            bad=1
          fi
        done

        if [ "$bad" -eq 0 ]; then
          echo ok
          exit 0
        else
          exit 1
        fi
      '
    pass_if_regex:
      - "^ok$"
    fail_if_regex:
      - "^future"

  - id: "CIS-5.5.6"
    name: "Cuentas del sistema sin shell de login (UID < UID_MIN)"
    section: "5.5"
    category: "User Accounts and Environment"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: >
      bash -lc '
        min=$(awk "/^[[:space:]]*UID_MIN[[:space:]]+/{print \$2}" /etc/login.defs);
        awk -F: -v m="$min" \
            -v ex="^({{ excluded_users_regex }})$" \
            -v re="^(/usr)?/sbin/nologin(/)?$|^(/usr)?/bin/false(/)?$" \
        "
        BEGIN{bad=0}
        (\$3<m && \$1!~ex){
          if (\$7 !~ re) { print \"bad:\" \$1 \":\" \$7; bad=1 }
        }
        END{ if(bad==0) print \"ok\"; exit bad }
        " /etc/passwd
      '
    pass_if_regex:
      - "^ok$"
    fail_if_regex:
      - "^bad:"

  - id: "CIS-5.5.7"
    name: "root pertenece a GID 0"
    section: "5.5"
    category: "User Accounts and Environment"
    os_scope:
      - RHEL
      - OL
    use_shell: true
    command: "awk -F: '/^root:/{print $4}' /etc/passwd | grep -x 0"
    pass_if_regex: []
    fail_if_regex: []