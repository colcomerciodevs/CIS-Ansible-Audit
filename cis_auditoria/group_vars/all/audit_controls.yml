      fi;

      enabled=$(systemctl is-enabled rsyncd.socket rsyncd.service 2>/dev/null | grep -c enabled || true);
      active=$(systemctl is-active rsyncd.socket rsyncd.service 2>/dev/null | grep -c "^active" || true);

      if [[ "$enabled" -eq 0 && "$active" -eq 0 ]]; then
        echo "installed_but_disabled";
        exit 0;
      else
        echo "enabled_or_active";
        exit 1;
      fi
      '
    pass_if_regex:
      - '^not_installed$'
      - '^installed_but_disabled$'
    fail_if_regex:
      - '^enabled_or_active$'

