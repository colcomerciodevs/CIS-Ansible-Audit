  ######################################################################
  # Sección 5.4 - Configurar PAM
  ######################################################################

  - id: CIS-5.4.1
    name: "PAM: pwquality y políticas (minlen/minclass)"
    os_scope:
      - RHEL
      - OL
    command: >
      grep -E '\bpam_pwquality\.so\b' /etc/pam.d/system-auth /etc/pam.d/password-auth;
      grep -E '^(minlen|minclass|\s*\S*credit\s*=)' /etc/security/pwquality.conf
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.4.2
    name: "PAM: faillock (deny y unlock_time definidos)"
    os_scope:
      - RHEL
      - OL
    command: >
      grep -E '^\s*deny\s*=\s*[1-5]\b' /etc/security/faillock.conf;
      grep -E '^\s*unlock_time\s*=' /etc/security/faillock.conf
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.4.3
    name: "PAM: historial de contraseñas (remember ≥ 5)"
    os_scope:
      - RHEL
      - OL
    command: >
      grep -P '^\s*password\s+(requisite|sufficient)\s+(pam_pwhistory\.so|pam_unix\.so)\s+([^#\n\r]+\s+)?remember=([5-9]|[1-9][0-9]+)\s*(\s+.*)?$'
      /etc/pam.d/system-auth
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.4.4
    name: "PAM: cifrado SHA512 en sistema"
    os_scope:
      - RHEL
      - OL
    command: >
      grep -Ei '^\s*crypt_style\s*=\s*sha512\b' /etc/libuser.conf;
      grep -Ei '^\s*ENCRYPT_METHOD\s+SHA512\b' /etc/login.defs;
      grep -P -- '^\s*password\s+(requisite|required|sufficient)\s+pam_unix\.so(\s+[^#\n\r]+)?\s+sha512\b.*$'
      /etc/pam.d/password-auth /etc/pam.d/system-auth
    pass_if_regex: []
    fail_if_regex: []

  ######################################################################
  # Sección 5.5 - Entorno y cuentas de usuario
  ######################################################################

  - id: CIS-5.5.1
    name: "PASS_MAX_DAYS <= 365"
    os_scope:
      - RHEL
      - OL
    command: >
      awk '/^[[:space:]]*PASS_MAX_DAYS[[:space:]]+/ {v=$2}
          END{
            if(v!="" && v<=365) {
              print "PASS_MAX_DAYS=" v; exit 0
            } else {
              print "PASS_MAX_DAYS=" (v=="" ? "undefined" : v); exit 1
            }
          }' /etc/login.defs
    pass_if_regex:
      - '^PASS_MAX_DAYS=([0-9]|[1-9][0-9]|[12][0-9][0-9]|3[0-5][0-9]|360|361|362|363|364|365)$'
    fail_if_regex: []

  - id: CIS-5.5.2
    name: "PASS_MIN_DAYS >= 1"
    os_scope:
      - RHEL
      - OL
    command: >
      awk '/^[[:space:]]*PASS_MIN_DAYS[[:space:]]+/ {v=$2}
          END{
            if(v!="" && v>=1) {
              print "PASS_MIN_DAYS=" v; exit 0
            } else {
              print "PASS_MIN_DAYS=" (v=="" ? "undefined" : v); exit 1
            }
          }' /etc/login.defs
    pass_if_regex:
      - '^PASS_MIN_DAYS=([1-9][0-9]*)$'
    fail_if_regex: []

  - id: CIS-5.5.3
    name: "PASS_WARN_AGE >= 7"
    os_scope:
      - RHEL
      - OL
    command: >
      awk '/^[[:space:]]*PASS_WARN_AGE[[:space:]]+/ {v=$2}
          END{
            if(v!="" && v>=7) {
              print "PASS_WARN_AGE=" v; exit 0
            } else {
              print "PASS_WARN_AGE=" (v=="" ? "undefined" : v); exit 1
            }
          }' /etc/login.defs
    pass_if_regex:
      - '^PASS_WARN_AGE=([7-9]|[1-9][0-9]+)$'
    fail_if_regex: []

  - id: CIS-5.5.4
    name: "INACTIVE <= 30 (>=0)"
    os_scope:
      - RHEL
      - OL
    command: >
      sh -lc 'i=$(useradd -D | awk -F= "/^INACTIVE=/{print \$2}");
              if [ -n "$i" ] && [ "$i" -le 30 ] && [ "$i" -ge 0 ]; then
                echo "INACTIVE=$i";
                exit 0;
              else
                echo "INACTIVE=${i:-undefined}";
                exit 1;
              fi'
    pass_if_regex:
      - '^INACTIVE=([0-9]|[12][0-9]|30)$'
    fail_if_regex: []

  - id: CIS-5.5.5
    name: "Sin cambios de contraseña fechados en el futuro"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
        bad=0
        mapfile -t USERS < <(awk -F: "(\$2 !~ /^[!*]/){print \$1}" /etc/shadow 2>/dev/null |
                            grep -Ev "^({{ excluded_users_regex }})$" || true)

        for u in "${USERS[@]}"; do
          [ -z "$u" ] && continue
          d=$(chage --list "$u" 2>/dev/null | awk -F": " "/^Last password change/{print \$2}")
          [ "$d" = "never" ] || [ -z "$d" ] && continue
          ts=$(date -d "$d" +%s 2>/dev/null) || ts=0
          now=$(date +%s)
          if [ "$ts" -gt "$now" ]; then
            echo "future:$u:$d"
            bad=1
          fi
        done

        if [ "$bad" -eq 0 ]; then
          echo "No future password dates found"
          exit 0
        else
          exit 1
        fi
      '
    pass_if_regex:
      - '^No future password dates found$'
    fail_if_regex:
      - '^future:'

  - id: CIS-5.5.6
    name: "Cuentas del sistema sin shell de login (UID < UID_MIN)"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
        min=$(awk "/^[[:space:]]*UID_MIN[[:space:]]+/{print \$2}" /etc/login.defs);

        excl_data=$(for u in {{ excluded_users | join(" ") }}; do
          shell=$(getent passwd "$u" | awk -F: "{print \$7}");
          [ -z "$shell" ] && shell="not_found";

          pstat=$(passwd -S "$u" 2>/dev/null | awk "{print \$2}");
          if [ "$pstat" = "L" ]; then
            locked="yes";
          elif [ -z "$pstat" ]; then
            locked="unknown";
          else
            locked="no";
          fi;

          echo "${u}:shell=${shell},locked=${locked}";
        done | paste -sd "; " -);

        awk -F: -v m="$min" \
            -v ex="^({{ excluded_users_regex }})$" \
            -v re="^(/usr)?/sbin/nologin(/)?$|^(/usr)?/bin/false(/)?$" \
        "
        BEGIN{bad=0}
        (\$3<m && \$1!~ex){
          if (\$7 !~ re) { print \"bad:\" \$1 \":\" \$7; bad=1 }
        }
        END{
          if(bad==0) {
            print \"All system accounts use nologin/false\"
          }
          exit bad
        }
        " /etc/passwd

        echo "exclusions=${excl_data}"
      '
    pass_if_regex:
      - '^All system accounts use nologin/false$'
    fail_if_regex:
      - '^bad:'

  - id: CIS-5.5.7
    name: "root pertenece a GID 0"
    os_scope:
      - RHEL
      - OL
    command: "awk -F: '/^root:/{print $4}' /etc/passwd | grep -x 0"
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.5.8
    name: "Umask por defecto 027/077 en perfiles globales/usuarios"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'line=$(grep -E "^\s*umask\s+(027|077)\b" /etc/bashrc /etc/profile /etc/profile.d/* ~/.bashrc ~/.profile 2>/dev/null | head -1);
                if [ -n "$line" ]; then
                  echo "$line";
                  exit 0;
                else
                  echo "umask_not_set";
                  exit 1;
                fi'
    pass_if_regex:
      - 'umask (027|077)'
    fail_if_regex:
      - '^umask_not_set$'

  - id: CIS-5.5.9
    name: "TMOUT configurado (presencia)"
