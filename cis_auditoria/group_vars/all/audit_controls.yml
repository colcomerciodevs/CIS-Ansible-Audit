  ######################################################################
  # Sección 3.1 - Deshabilitar dispositivos/protocolos de red no usados
  ######################################################################

  - id: CIS-3.1.1
    name: "Ensure IPv6 status is identified"
    os_scope:
      - RHEL
      - OL
    command: "grep -E 'net\\.ipv6\\.conf\\.(all|default)\\.disable_ipv6' /etc/sysctl.conf /etc/sysctl.d/*"
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-3.1.2
    name: "Ensure wireless interfaces are disabled"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      if find /sys/class/net/*/ -type d -name wireless 2>/dev/null | grep -q .; then
          if nmcli radio wifi | grep -iq disabled; then
              echo "PASS: wireless presente pero deshabilitado"
          else
              echo "FAIL: wireless presente y habilitado"
          fi
      else
          echo "PASS: no hay interfaces wireless"
      fi
      '
    pass_if_regex:
      - "PASS:"
    fail_if_regex:
      - "FAIL:"

  ######################################################################
  # Sección 3.2 - Parámetros de Red (Host Only)
  ######################################################################

  - id: CIS-3.2.1
    name: "Ensure packet redirect sending is disabled"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'ca=$(sysctl -n net.ipv4.conf.all.send_redirects 2>/dev/null || echo);
                cd=$(sysctl -n net.ipv4.conf.default.send_redirects 2>/dev/null || echo);
                if [[ "$ca" == "0" && "$cd" == "0" ]]; then
                  echo "all=0 default=0"; exit 0;
                fi;
                if grep -RqsE "^\s*net\.ipv4\.conf\.(all|default)\.send_redirects\s*=\s*0\b" /etc/sysctl.conf /etc/sysctl.d; then
                  echo "persisted=0"; exit 0;
                fi;
                echo "all=$ca default=$cd"; exit 1'
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-3.2.2
    name: "Ensure IP forwarding is disabled"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'v=$(sysctl -n net.ipv4.ip_forward 2>/dev/null || echo);
                if [[ "$v" == "0" ]]; then
                  echo "ip_forward=0"; exit 0;
                fi;
                if grep -RqsE "^\s*net\.ipv4\.ip_forward\s*=\s*0\b" /etc/sysctl.conf /etc/sysctl.d; then
                  echo "persisted=0"; exit 0;
                fi;
                echo "ip_forward=$v"; exit 1'
    pass_if_regex: []
    fail_if_regex: []

  ######################################################################
  # Sección 3.3 - Parámetros de Red (Host & Router)
  ######################################################################

  - id: CIS-3.3.1
    name: "Ensure source routed packets are not accepted"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'a=$(sysctl -n net.ipv4.conf.all.accept_source_route 2>/dev/null || echo);
                d=$(sysctl -n net.ipv4.conf.default.accept_source_route 2>/dev/null || echo);
                if [[ "$a" == "0" && "$d" == "0" ]]; then
                  echo "all=0 default=0"; exit 0;
                fi;
                if grep -RqsE "^\s*net\.ipv4\.conf\.(all|default)\.accept_source_route\s*=\s*0\b" /etc/sysctl.conf /etc/sysctl.d; then
                  echo "persisted=0"; exit 0;
                fi;
                echo "all=$a default=$d"; exit 1'
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-3.3.2
    name: "Ensure ICMP redirects are not accepted"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'a=$(sysctl -n net.ipv4.conf.all.accept_redirects 2>/dev/null || echo);
                d=$(sysctl -n net.ipv4.conf.default.accept_redirects 2>/dev/null || echo);
                if [[ "$a" == "0" && "$d" == "0" ]]; then
                  echo "all=0 default=0"; exit 0;
                fi;
                if grep -RqsE "^\s*net\.ipv4\.conf\.(all|default)\.accept_redirects\s*=\s*0\b" /etc/sysctl.conf /etc/sysctl.d; then
                  echo "persisted=0"; exit 0;
                fi;
                echo "all=$a default=$d"; exit 1'
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-3.3.3
    name: "Ensure secure ICMP redirects are not accepted"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'a=$(sysctl -n net.ipv4.conf.all.secure_redirects 2>/dev/null || echo);
                d=$(sysctl -n net.ipv4.conf.default.secure_redirects 2>/dev/null || echo);
                if [[ "$a" == "0" && "$d" == "0" ]]; then
                  echo "all=0 default=0"; exit 0;
                fi;
                if grep -RqsE "^\s*net\.ipv4\.conf\.(all|default)\.secure_redirects\s*=\s*0\b" /etc/sysctl.conf /etc/sysctl.d; then
                  echo "persisted=0"; exit 0;
                fi;
                echo "all=$a default=$d"; exit 1'
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-3.3.4
    name: "Ensure suspicious packets are logged"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'a=$(sysctl -n net.ipv4.conf.all.log_martians 2>/dev/null || echo);
                d=$(sysctl -n net.ipv4.conf.default.log_martians 2>/dev/null || echo);
                if [[ "$a" == "1" && "$d" == "1" ]]; then
                  echo "all=1 default=1"; exit 0;
                fi;
                if grep -RqsE "^\s*net\.ipv4\.conf\.(all|default)\.log_martians\s*=\s*1\b" /etc/sysctl.conf /etc/sysctl.d; then
                  echo "persisted=1"; exit 0;
                fi;
                echo "all=$a default=$d"; exit 1'
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-3.3.5
    name: "Ensure broadcast ICMP requests are ignored"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'v=$(sysctl -n net.ipv4.icmp_echo_ignore_broadcasts 2>/dev/null || echo);
                if [[ "$v" == "1" ]]; then
                  echo "icmp_echo_ignore_broadcasts=1"; exit 0;
                fi;
                if grep -RqsE "^\s*net\.ipv4\.icmp_echo_ignore_broadcasts\s*=\s*1\b" /etc/sysctl.conf /etc/sysctl.d; then
                  echo "persisted=1"; exit 0;
                fi;
                echo "icmp_echo_ignore_broadcasts=$v"; exit 1'
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-3.3.6
    name: "Ensure bogus ICMP responses are ignored"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'v=$(sysctl -n net.ipv4.icmp_ignore_bogus_error_responses 2>/dev/null || echo);
                if [[ "$v" == "1" ]]; then
                  echo "icmp_ignore_bogus_error_responses=1"; exit 0;
                fi;
                if grep -RqsE "^\s*net\.ipv4\.icmp_ignore_bogus_error_responses\s*=\s*1\b" /etc/sysctl.conf /etc/sysctl.d; then
                  echo "persisted=1"; exit 0;
                fi;
                echo "icmp_ignore_bogus_error_responses=$v"; exit 1'
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-3.3.7
    name: "Ensure reverse path filtering is enabled"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'a=$(sysctl -n net.ipv4.conf.all.rp_filter 2>/dev/null || echo);
                d=$(sysctl -n net.ipv4.conf.default.rp_filter 2>/dev/null || echo);
                if [[ "$a" =~ ^[12]$ && "$d" =~ ^[12]$ ]]; then
                  echo "all=$a default=$d"; exit 0;
                fi;
                if grep -RqsE "^\s*net\.ipv4\.conf\.(all|default)\.rp_filter\s*=\s*[12]\b" /etc/sysctl.conf /etc/sysctl.d; then
                  echo "persisted=[1|2]"; exit 0;
                fi;
                echo "all=$a default=$d"; exit 1'
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-3.3.8
    name: "Ensure TCP SYN cookies is enabled"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'v=$(sysctl -n net.ipv4.tcp_syncookies 2>/dev/null || echo);
                if [[ "$v" == "1" ]]; then
                  echo "tcp_syncookies=1"; exit 0;
                fi;
                if grep -RqsE "^\s*net\.ipv4\.tcp_syncookies\s*=\s*1\b" /etc/sysctl.conf /etc/sysctl.d; then
                  echo "persisted=1"; exit 0;
                fi;
                echo "tcp_syncookies=$v"; exit 1'
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-3.3.9
    name: "Ensure IPv6 router advertisements are not accepted"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      if { [ "$(sysctl -n net.ipv6.conf.all.disable_ipv6 2>/dev/null)" = "1" ] &&
          [ "$(sysctl -n net.ipv6.conf.default.disable_ipv6 2>/dev/null)" = "1" ]; }; then
        echo "IPv6 disabled - not applicable"; exit 0;
      fi;
      ca=$(sysctl -n net.ipv6.conf.all.accept_ra 2>/dev/null || echo);
      cd=$(sysctl -n net.ipv6.conf.default.accept_ra 2>/dev/null || echo);
      if [[ "$ca" == "0" && "$cd" == "0" ]]; then
        echo "all=0 default=0"; exit 0;
      fi;
      if grep -RqsE "^\s*net\.ipv6\.conf\.(all|default)\.accept_ra\s*=\s*0\b" /etc/sysctl.conf /etc/sysctl.d 2>/dev/null; then
        echo "persisted=0"; exit 0;
      fi;
      echo "all=$ca default=$cd"; exit 1'
    pass_if_regex:
      - "all=0 default=0"
      - "persisted=0"
      - "IPv6 disabled - not applicable"
    fail_if_regex:
      - "all="

  ######################################################################
  # Sección 3.4 - Protocolos de Red No Comunes
  ######################################################################

  - id: CIS-3.4.1
    name: "Ensure DCCP is disabled"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
        if modprobe -n -v dccp 2>/dev/null | grep -Eq "^\s*install\s+/bin/(false|true)\b"; then
          echo blocked; exit 0;
        fi
        if lsmod | awk "{print \$1}" | grep -qx dccp; then
          echo loaded; exit 1;
        fi
        if modinfo -n dccp >/dev/null 2>&1; then
          echo available; exit 1;
        else
          echo absent; exit 0;
        fi'
    pass_if_regex:
      - "^blocked$"
      - "^absent$"
    fail_if_regex:
      - "^loaded$"
      - "^available$"

  - id: CIS-3.4.2
    name: "Ensure SCTP is disabled"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
        if modprobe -n -v sctp 2>/dev/null | grep -Eq "^\s*install\s+/bin/(false|true)\b"; then
          echo blocked; exit 0;
        fi
        if lsmod | awk "{print \$1}" | grep -qx sctp; then
          echo loaded; exit 1;
        fi
        if modinfo -n sctp >/dev/null 2>&1; then
          echo available; exit 1;
        else
          echo absent; exit 0;
        fi'
    pass_if_regex:
      - "^blocked$"
      - "^absent$"
    fail_if_regex:
      - "^loaded$"
      - "^available$"

  - id: CIS-3.4.3
    name: "Ensure RDS is disabled"
    os_scope:
      - RHEL
      - OL
    command: "bash -lc 'echo not_applicable'"
    pass_if_regex:
      - '^not_applicable$'
    fail_if_regex: []

  - id: CIS-3.4.4
    name: "Ensure TIPC is disabled"
    os_scope:
      - RHEL
      - OL
    command: "bash -lc 'echo not_applicable'"
    pass_if_regex:
      - '^not_applicable$'
    fail_if_regex: []

    ######################################################################
  # Sección 5.1 - Jobs programados (cron/at)
  ######################################################################

  - id: CIS-5.1.1
    name: "Ensure cron daemon is enabled and running"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'v=$(systemctl is-enabled crond 2>/dev/null || true);
      if [ -n "$v" ]; then
        echo "crond=$v";
        [[ "$v" =~ ^(enabled|static|generated|alias)$ ]] && exit 0 || exit 1;
      else
        echo "crond=unknown";
        exit 1;
      fi'
    pass_if_regex:
      - '^crond=enabled$'
      - '^crond=static$'
      - '^crond=generated$'
      - '^crond=alias$'
    fail_if_regex:
      - '^crond=unknown$'
      - '^crond=disabled$'
      - '^crond=masked$'

  - id: CIS-5.1.2
    name: "Ensure permissions on /etc/crontab are configured"
    os_scope:
      - RHEL
      - OL
    command: "stat -c 'mode=%a owner=%U group=%G file=%n' /etc/crontab"
    pass_if_regex:
      - '^mode=600 owner=root group=root file=/etc/crontab$'
      - '^mode=640 owner=root group=root file=/etc/crontab$'
    fail_if_regex: []

  - id: CIS-5.1.3
    name: "Ensure permissions on /etc/cron.hourly are configured"
    os_scope:
      - RHEL
      - OL
    command: "stat -c 'mode=%a owner=%U group=%G file=%n' /etc/cron.hourly"
    pass_if_regex:
      - '^mode=700 owner=root group=root file=/etc/cron.hourly$'
    fail_if_regex: []

  - id: CIS-5.1.4
    name: "Ensure permissions on /etc/cron.daily are configured"
    os_scope:
      - RHEL
      - OL
    command: "stat -c 'mode=%a owner=%U group=%G file=%n' /etc/cron.daily"
    pass_if_regex:
      - '^mode=700 owner=root group=root file=/etc/cron.daily$'
    fail_if_regex: []

  - id: CIS-5.1.5
    name: "Ensure permissions on /etc/cron.weekly are configured"
    os_scope:
      - RHEL
      - OL
    command: "stat -c 'mode=%a owner=%U group=%G file=%n' /etc/cron.weekly"
    pass_if_regex:
      - '^mode=700 owner=root group=root file=/etc/cron.weekly$'
    fail_if_regex: []

  - id: CIS-5.1.6
    name: "Ensure permissions on /etc/cron.monthly are configured"
    os_scope:
      - RHEL
      - OL
    command: "stat -c 'mode=%a owner=%U group=%G file=%n' /etc/cron.monthly"
    pass_if_regex:
      - '^mode=700 owner=root group=root file=/etc/cron.monthly$'
    fail_if_regex: []

  - id: CIS-5.1.7
    name: "Ensure permissions on /etc/cron.d are configured"
    os_scope:
      - RHEL
      - OL
    command: "stat -c 'mode=%a owner=%U group=%G file=%n' /etc/cron.d"
    pass_if_regex:
      - '^mode=700 owner=root group=root file=/etc/cron.d$'
    fail_if_regex: []

  - id: CIS-5.1.8
    name: "Ensure cron is restricted to authorized users"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      perm=$(stat -c "mode=%a owner=%U group=%G file=%n" /etc/cron.allow 2>/dev/null || echo "cron.allow_missing");
      deny=$([ ! -e /etc/cron.deny ] && echo "cron.deny=absent" || echo "cron.deny=present");
      users=$(awk "NF && \$1 !~ /^#/" /etc/cron.allow 2>/dev/null | paste -sd "," -);
      [ -z "$users" ] && users="none";
      echo "$perm | $deny | exclusions=$users";
      [[ "$perm" == "mode=600 owner=root group=root file=/etc/cron.allow" && "$deny" == "cron.deny=absent" ]]'
    pass_if_regex:
      - '^mode=600 owner=root group=root file=/etc/cron.allow \| cron\.deny=absent'
    fail_if_regex:
      - 'cron\.deny=present'
      - '^cron\.allow_missing'

  - id: CIS-5.1.9
    name: "Ensure at is restricted to authorized users"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      perm=$(stat -c "mode=%a owner=%U group=%G file=%n" /etc/at.allow 2>/dev/null || echo "at.allow_missing");
      deny=$([ ! -e /etc/at.deny ] && echo "at.deny=absent" || echo "at.deny=present");
      users=$(awk "NF && \$1 !~ /^#/" /etc/at.allow 2>/dev/null | paste -sd "," -);
      [ -z "$users" ] && users="none";
      echo "$perm | $deny | exclusions=$users";
      [[ "$perm" == "mode=600 owner=root group=root file=/etc/at.allow" && "$deny" == "at.deny=absent" ]]'
    pass_if_regex:
      - '^mode=600 owner=root group=root file=/etc/at.allow \| at\.deny=absent'
    fail_if_regex:
      - 'at\.deny=present'
      - '^at\.allow_missing'

  ######################################################################
  # Sección 5.2 - Configurar SUDO
  ######################################################################

  - id: CIS-5.2.1
    name: "Ensure sudo is installed"
    os_scope:
      - RHEL
      - OL
    command: "rpm -q sudo"
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.2.2
    name: "Ensure sudo commands use pty"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'grep -rPi "^[[:space:]]*Defaults[[:space:]]+([^#\n\r]+,)?use_pty(,[[:space:]]*\S+)*[[:space:]]*(#.*)?$" /etc/sudoers* 2>/dev/null || true'
    pass_if_regex:
      - "use_pty"
    fail_if_regex: []

  - id: CIS-5.2.3
    name: "Ensure sudo log file exists"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'grep -rPsi "^[[:space:]]*Defaults[[:space:]]+([^#]+,[[:space:]]*)?logfile[[:space:]]*=[[:space:]]*(\"|\\'\\')?\\S+(\"|\\'\\')?(,[[:space:]]*\\S+)*[[:space:]]*(#.*)?$" /etc/sudoers* 2>/dev/null || true'
    pass_if_regex:
      - "logfile"
    fail_if_regex: []

  - id: CIS-5.2.4
    name: "Ensure users must provide password for privilege escalation"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      EXCLUDE="{{ sudoers_exclude_nopasswd_users | join(" ") }}";

      hits=$(grep -RIP "^[[:space:]]*[^#].*NOPASSWD" /etc/sudoers /etc/sudoers.d 2>/dev/null || true);

      all_users=$(echo "$hits" | awk "NF{print \$1}" | paste -sd "," -);
      [ -z "$all_users" ] && all_users="none";

      bad=$(echo "$hits" | while read line; do
        user=$(echo "$line" | awk "{print \$1}")
        skip=0

        for u in $EXCLUDE; do
          [ "$user" = "$u" ] && skip=1
        done

        [ $skip -eq 0 ] && echo "$line"
      done)

      echo "exclusions=$all_users";

      if [ -n "$bad" ]; then
        exit 1
      else
        exit 0
      fi
      '
    pass_if_regex:
      - '^exclusions='
    fail_if_regex:
      - 'NOPASSWD'

  - id: CIS-5.2.5
    name: "Ensure re-authentication for privilege escalation is not disabled globally"
    os_scope:
      - RHEL
      - OL
    command: "sh -c \"! grep -r '^[^#].*!authenticate' /etc/sudoers* 2>/dev/null | grep -q .\""
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.2.6
    name: "Ensure sudo authentication timeout is configured correctly"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'grep -rhoP "timestamp_timeout=\K[0-9]+" /etc/sudoers* 2>/dev/null || true'
    pass_if_regex:
      - "^[0-9]+$"
    fail_if_regex: []

  - id: CIS-5.2.7
    name: "Ensure access to the su command is restricted"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      line=$(grep -Pi "^[[:space:]]*auth[[:space:]]+(required|requisite)[[:space:]]+pam_wheel\.so.*(use_uid|group=)" /etc/pam.d/su | head -n1);
      if [ -z "$line" ]; then
        echo "group=none | exclusions=none";
        exit 1;
      fi;
      grp=$(echo "$line" | sed -n "s/.*group=\([^[:space:]]*\).*/\1/p");
      [ -z "$grp" ] && grp="wheel";
      users=$(getent group "$grp" | awk -F: "{print \$4}");
      [ -z "$users" ] && users="none";
      echo "group=$grp | exclusions=$users";
      exit 0'
    pass_if_regex:
      - '^group='
    fail_if_regex: []

  - id: CIS-5.2.8
    name: "Asegurar que es usado el perfil personalizado de authselect y contiene módulos PAM"
    os_scope:
      - RHEL
      - OL
    command: |
      bash -lc '
      profile=$(authselect current 2>/dev/null | awk -F": " "/Profile ID/ {print \$2}")

      if [[ -z "$profile" ]]; then
        echo "NO CUMPLE - no se pudo obtener el profile"
        exit 1
      fi

      # Validar que sea custom
      [[ "$profile" == custom/* ]] || {
        echo "NO CUMPLE - no usa perfil custom ($profile)"
        exit 1
      }

      base="/etc/authselect/$profile"

      # Validar templates
      [ -f "$base/system-auth" ] && [ -f "$base/password-auth" ] || {
        echo "NO CUMPLE - no existen templates en $base"
        exit 1
      }

      # Validar módulos requeridos en el perfil
      faltantes=""
      for mod in pam_pwquality.so pam_pwhistory.so pam_faillock.so pam_unix.so; do
        grep -Pq -- "\b${mod//./\\.}\b" "$base/system-auth" "$base/password-auth" || {
          faltantes="$faltantes $mod"
        }
      done

      if [[ -n "$faltantes" ]]; then
        echo "NO CUMPLE - faltan:$faltantes"
        exit 1
      fi

      echo "CUMPLE"
      '
    pass_if_regex:
      - '^CUMPLE$'
    fail_if_regex:
      - '^NO CUMPLE'

  - id: CIS-5.2.9
    name: "Ensure authselect includes with-faillock"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      authselect current 2>/dev/null | grep -q "with-faillock" && echo "CUMPLE" || { echo "NO CUMPLE"; exit 1; }
      '
    pass_if_regex:
      - '^CUMPLE$'
    fail_if_regex:
      - '^NO CUMPLE$'

  ######################################################################
  # Sección 5.3 - Configurar Servidor SSH
  ######################################################################

  - id: CIS-5.3.1
    name: "Ensure permissions on /etc/ssh/sshd_config are configured"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      file="/etc/ssh/sshd_config";
      perm_mask="0177";
      maxperm="$(printf "%o" "$((0777 & ~perm_mask))")";

      if [ ! -e "$file" ]; then
        echo "$file NO existe";
        exit 1;
      fi;

      mode="$(stat -Lc "%#a" "$file")";
      owner="$(stat -Lc "%U" "$file")";
      group="$(stat -Lc "%G" "$file")";
      mode_num=$((8#$mode));

      fail=0;
      msg="";

      if [ $(( mode_num & perm_mask )) -gt 0 ]; then
        msg="$msg - Permisos actuales: $mode ; esperado: $maxperm o más restrictivo\n";
        fail=1;
      fi;

      if [ "$owner" != "root" ]; then
        msg="$msg - Owner actual: $owner ; esperado: root\n";
        fail=1;
      fi;

      if [ "$group" != "root" ]; then
        msg="$msg - Grupo actual: $group ; esperado: root\n";
        fail=1;
      fi;

      if [ "$fail" -eq 0 ]; then
        echo -e "$file existe (stat)\nCorrecto: permisos ($mode), owner ($owner), grupo ($group)";
      else
        echo -e "$file existe (stat)\nIncorrecto:\n$msg";
        exit 1;
      fi
      '
    pass_if_regex:
      - "Correcto:"
    fail_if_regex:
      - "Incorrecto"
      - "NO existe"

  - id: CIS-5.3.2
    name: "Ensure permissions on SSH private host key files are configured"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      l_ssh_group_name="$(awk -F: '"'"'($1 ~ /^(ssh_keys|_?ssh)$/) {print $1; exit}'"'"' /etc/group)";

      found=0;

      while IFS= read -r -d $'\''\0'\'' f; do
        if ssh-keygen -lf "$f" >/dev/null 2>&1 && file "$f" | grep -Piq '"'"'\bopenssh\h+([^#\n\r]+\h+)?private\h+key\b'"'"'; then

          found=1;
          mode=$(stat -Lc "%#a" "$f");
          owner=$(stat -Lc "%U" "$f");
          group=$(stat -Lc "%G" "$f");

          [ "$group" = "$l_ssh_group_name" ] && pmask=0137 || pmask=0177;

          if [ $(( 8#$mode & pmask )) -eq 0 ] && \
            [ "$owner" = "root" ] && \
            [[ "$group" = "root" || "$group" = "$l_ssh_group_name" ]]; then

              echo "$f (private key) - Correcto: permisos ($mode), owner ($owner), grupo ($group)";
          else
              echo "$f (private key) - Incorrecto: permisos ($mode), owner ($owner), grupo ($group)";
          fi
        fi
      done < <(find -L /etc/ssh -xdev -type f -print0 2>/dev/null);

      [ "$found" -eq 0 ] && echo "No se encontraron llaves privadas OpenSSH en /etc/ssh"
      '
    pass_if_regex:
      - "Correcto:"
      - "No se encontraron llaves privadas OpenSSH"
    fail_if_regex:
      - "Incorrecto:"

  - id: CIS-5.3.3
    name: "Ensure permissions on SSH public host key files are configured"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      found=0;

      while IFS= read -r -d $'\''\0'\'' f; do
        if ssh-keygen -lf "$f" >/dev/null 2>&1 && file "$f" | grep -Piq '"'"'\bopenssh\h+([^#\n\r]+\h+)?public\h+key\b'"'"'; then

          found=1;
          mode=$(stat -Lc "%#a" "$f");
          owner=$(stat -Lc "%U" "$f");
          group=$(stat -Lc "%G" "$f");

          if [ $(( 8#$mode & 0133 )) -eq 0 ] && [ "$owner" = "root" ] && [ "$group" = "root" ]; then
            echo "$f (public key) - Correcto: permisos ($mode), owner ($owner), grupo ($group)";
          else
            echo "$f (public key) - Incorrecto: permisos ($mode), owner ($owner), grupo ($group)";
          fi
        fi
      done < <(find -L /etc/ssh -xdev -type f -print0 2>/dev/null);

      [ "$found" -eq 0 ] && echo "No se encontraron llaves públicas OpenSSH en /etc/ssh"
      '
    pass_if_regex:
      - "Correcto:"
      - "No se encontraron llaves públicas OpenSSH"
    fail_if_regex:
      - "Incorrecto:"

  - id: CIS-5.3.4
    name: "Ensure SSH access is limited"
    os_scope:
      - RHEL
      - OL
    command: "grep -Pi '^[[:space:]]*(allow|deny)(users|groups)[[:space:]]+\\S+' /etc/ssh/sshd_config"
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.3.5
    name: "Ensure SSH LogLevel is appropriate"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^loglevel (INFO|VERBOSE)$'"
    pass_if_regex:
      - '^loglevel (INFO|VERBOSE)$'
    fail_if_regex: []

  - id: CIS-5.3.6
    name: "Ensure SSH X11 forwarding is disabled"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -i x11forwarding"
    pass_if_regex:
      - '(?i)x11forwarding\s+no'
    fail_if_regex:
      - '(?i)x11forwarding\s+yes'

  - id: CIS-5.3.7
    name: "Ensure SSH MaxAuthTries is set to 4 or less"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^maxauthtries ([1-4])$'"
    pass_if_regex:
      - '^maxauthtries ([1-4])$'
    fail_if_regex: []

  - id: CIS-5.3.8
    name: "Ensure SSH IgnoreRhosts is enabled"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^ignorerhosts yes$'"
    pass_if_regex:
      - '^ignorerhosts yes$'
    fail_if_regex: []

  - id: CIS-5.3.9
    name: "Ensure SSH HostbasedAuthentication is disabled"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^hostbasedauthentication no$'"
    pass_if_regex:
      - '^hostbasedauthentication no$'
    fail_if_regex: []

  - id: CIS-5.3.10
    name: "Ensure SSH root login is disabled"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^permitrootlogin (no|prohibit-password)$'"
    pass_if_regex:
      - '^permitrootlogin (no|prohibit-password)$'
    fail_if_regex: []

  - id: CIS-5.3.11
    name: "Ensure SSH PermitEmptyPasswords is disabled"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^permitemptypasswords no$'"
    pass_if_regex:
      - '^permitemptypasswords no$'
    fail_if_regex: []

  - id: CIS-5.3.12
    name: "Ensure SSH PermitUserEnvironment is disabled"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^permituserenvironment no$'"
    pass_if_regex:
      - '^permituserenvironment no$'
    fail_if_regex: []

  - id: CIS-5.3.13
    name: "Ensure SSH Idle Timeout Interval is configured"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^(clientaliveinterval|clientalivecountmax) '"
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.3.14
    name: "Ensure SSH LoginGraceTime is set to one minute or less"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^logingracetime '"
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.3.15
    name: "Ensure SSH warning banner is configured"
    os_scope:
      - RHEL
      - OL
    command: "grep -hEi '^[[:space:]]*Banner[[:space:]]+(/[^[:space:]]+|\"/[^\"]+\")' /etc/ssh/sshd_config /etc/ssh/sshd_config.d/*.conf 2>/dev/null | tail -1"
    pass_if_regex:
      - '^[Bb]anner\s+/.+$'
    fail_if_regex:
      - '^[Bb]anner\s+none$'


  - id: CIS-5.3.16
    name: "Ensure SSH PAM is enabled"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^usepam yes$'"
    pass_if_regex:
      - "^usepam yes$"
    fail_if_regex: []

  - id: CIS-5.3.17
    name: "Ensure SSH AllowTcpForwarding is disabled"
    os_scope:
      - RHEL
      - OL
    command: "bash -lc 'echo not_applicable'"
    pass_if_regex:
      - '^not_applicable$'
    fail_if_regex: []

  - id: CIS-5.3.18
    name: "Ensure SSH MaxStartups is configured"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^maxstartups '"
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.3.19
    name: "Ensure SSH MaxSessions is limited"
    os_scope:
      - RHEL
      - OL
    command: "sshd -T | grep -E '^maxsessions (10|[1-9])$'"
    pass_if_regex:
      - "^maxsessions (10|[1-9])$"
    fail_if_regex: []

  ######################################################################
  # Sección 5.4 - Configurar PAM
  ######################################################################

  - id: CIS-5.4.1
    name: "Ensure password creation requirements are configured"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      out="";
      fail=0;

      difok_line=$(grep -Psi -- "^\h*difok\h*=\h*([2-9]|[1-9][0-9]+)\b" /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null | head -n1);
      minlen_line=$(grep -Psi -- "^\h*minlen\h*=\h*(1[4-9]|[2-9][0-9]|[1-9][0-9]{2,})\b" /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null | head -n1);

      if [ -n "$difok_line" ]; then
        out="$out\n- difok cumple: $difok_line";
      else
        out="$out\n- difok NO cumple (se espera difok >= 2)";
        fail=1;
      fi;

      if [ -n "$minlen_line" ]; then
        out="$out\n- minlen cumple: $minlen_line";
      else
        out="$out\n- minlen NO cumple (se espera minlen >= 14)";
        fail=1;
      fi;

      for p in dcredit ucredit lcredit ocredit; do
        line=$(grep -Psi -- "^\h*${p}\h*=\h*-[1-9][0-9]*\b" /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null | head -n1);
        if [ -n "$line" ]; then
          out="$out\n- $p cumple: $line";
        else
          out="$out\n- $p NO cumple (debe estar en valor negativo, no 0 ni mayor)";
          fail=1;
        fi;
      done;

      if [ "$fail" -eq 0 ]; then
        echo -e "PASS$out";
      else
        echo -e "FAIL$out";
        exit 1;
      fi
      '
    pass_if_regex:
      - "PASS"
    fail_if_regex:
      - "FAIL"

  - id: CIS-5.4.2
    name: "Ensure lockout for failed password attempts is configured"
    os_scope:
      - RHEL
      - OL
    command: >
      grep -E '^\s*deny\s*=\s*[1-5]\b' /etc/security/faillock.conf;
      grep -E '^\s*unlock_time\s*=' /etc/security/faillock.conf
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.4.3
    name: "Ensure password reuse is limited"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      fail=0;
      out="";

      conf_line=$(grep -Pi -- "^\h*remember\h*=\h*(2[4-9]|[3-9][0-9]|[1-9][0-9]{2,})\b" /etc/security/pwhistory.conf 2>/dev/null | head -n1);

      if [ -n "$conf_line" ]; then
        out="$out\n- pwhistory.conf cumple: $conf_line";
      else
        out="$out\n- /etc/security/pwhistory.conf NO cumple (se espera remember = 24 o mayor)";
        fail=1;
      fi;

      pam_lines=$(grep -Pi -- "^\h*password\h+(requisite|required|sufficient)\h+pam_pwhistory\.so\h+.*\bremember=\d+\b" /etc/pam.d/system-auth /etc/pam.d/password-auth 2>/dev/null);

      if [ -z "$pam_lines" ]; then
        out="$out\n- system-auth y password-auth cumplen: pam_pwhistory.so no tiene argumento remember";
      else
        out="$out\n- Se encontró remember= dentro de pam_pwhistory.so en PAM, y debe eliminarse:\n$pam_lines";
        fail=1;
      fi;

      if [ "$fail" -eq 0 ]; then
        echo -e "PASS$out";
      else
        echo -e "FAIL$out";
        exit 1;
      fi
      '
    pass_if_regex:
      - "PASS"
    fail_if_regex:
      - "FAIL"

  - id: CIS-5.4.4
    name: "Ensure password hashing algorithm is SHA-512"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      fail=0
      out=""

      profile="$(head -1 /etc/authselect/authselect.conf 2>/dev/null)"

      if [ -z "$profile" ]; then
        echo "FAIL"
        echo "- No fue posible identificar el perfil activo de authselect"
        exit 1
      fi

      if [[ "$profile" =~ ^custom/ ]]; then
        path="/etc/authselect/$profile"
      else
        path="/usr/share/authselect/default/$profile"
      fi

      if [ ! -d "$path" ]; then
        echo "FAIL"
        echo "- La ruta del perfil authselect no existe: $path"
        exit 1
      fi

      password_auth=$(grep -P -- "^\h*password\h+(requisite|required|sufficient)\h+pam_unix\.so\h+([^#\n\r]+\h+)?(sha512|yescrypt)\b" "$path/password-auth" 2>/dev/null)
      system_auth=$(grep -P -- "^\h*password\h+(requisite|required|sufficient)\h+pam_unix\.so\h+([^#\n\r]+\h+)?(sha512|yescrypt)\b" "$path/system-auth" 2>/dev/null)

      if [ -n "$password_auth" ]; then
        out="$out\n- password-auth cumple: $password_auth"
      else
        out="$out\n- password-auth NO cumple: no se encontró pam_unix.so con sha512 o yescrypt en $path/password-auth"
        fail=1
      fi

      if [ -n "$system_auth" ]; then
        out="$out\n- system-auth cumple: $system_auth"
      else
        out="$out\n- system-auth NO cumple: no se encontró pam_unix.so con sha512 o yescrypt en $path/system-auth"
        fail=1
      fi

      if [ "$fail" -eq 0 ]; then
        echo -e "PASS$out"
      else
        echo -e "FAIL$out"
        exit 1
      fi
      '
    pass_if_regex:
      - "PASS"
    fail_if_regex:
      - "FAIL"

  ######################################################################
  # Sección 5.5 - Entorno y cuentas de usuario
  ######################################################################

  - id: CIS-5.5.1
    name: "Ensure password expiration is 42 days or less"
    os_scope:
      - RHEL
      - OL
    command: >
      awk '/^[[:space:]]*PASS_MAX_DAYS[[:space:]]+/ {v=$2}
          END{
            if(v!="" && v<=365) {
              print "PASS_MAX_DAYS=" v; exit 0
            } else {
              print "PASS_MAX_DAYS=" (v=="" ? "undefined" : v); exit 1
            }
          }' /etc/login.defs
    pass_if_regex:
      - '^PASS_MAX_DAYS=([0-9]|[1-9][0-9]|[12][0-9][0-9]|3[0-5][0-9]|360|361|362|363|364|365)$'
    fail_if_regex: []

  - id: CIS-5.5.2
    name: "Ensure minimum days between password changes is configured"
    os_scope:
      - RHEL
      - OL
    command: >
      awk '/^[[:space:]]*PASS_MIN_DAYS[[:space:]]+/ {v=$2}
          END{
            if(v!="" && v>=1) {
              print "PASS_MIN_DAYS=" v; exit 0
            } else {
              print "PASS_MIN_DAYS=" (v=="" ? "undefined" : v); exit 1
            }
          }' /etc/login.defs
    pass_if_regex:
      - '^PASS_MIN_DAYS=([1-9][0-9]*)$'
    fail_if_regex: []

  - id: CIS-5.5.3
    name: "Ensure password expiration warning days is 5 or more"
    os_scope:
      - RHEL
      - OL
    command: >
      awk '/^[[:space:]]*PASS_WARN_AGE[[:space:]]+/ {v=$2}
          END{
            if(v!="" && v>=7) {
              print "PASS_WARN_AGE=" v; exit 0
            } else {
              print "PASS_WARN_AGE=" (v=="" ? "undefined" : v); exit 1
            }
          }' /etc/login.defs
    pass_if_regex:
      - '^PASS_WARN_AGE=([7-9]|[1-9][0-9]+)$'
    fail_if_regex: []

  - id: CIS-5.5.4
    name: "Ensure inactive password lock is 30 days or less"
    os_scope:
      - RHEL
      - OL
    command: >
      sh -lc 'i=$(useradd -D | awk -F= "/^INACTIVE=/{print \$2}");
              if [ -n "$i" ] && [ "$i" -le 30 ] && [ "$i" -ge 0 ]; then
                echo "INACTIVE=$i";
                exit 0;
              else
                echo "INACTIVE=${i:-undefined}";
                exit 1;
              fi'
    pass_if_regex:
      - '^INACTIVE=([0-9]|[12][0-9]|30)$'
    fail_if_regex: []

  - id: CIS-5.5.5
    name: "Ensure all users last password change date is in the past"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
        bad=0
        mapfile -t USERS < <(awk -F: "(\$2 !~ /^[!*]/){print \$1}" /etc/shadow 2>/dev/null |
                            grep -Ev "^({{ excluded_users_regex }})$" || true)

        for u in "${USERS[@]}"; do
          [ -z "$u" ] && continue
          d=$(chage --list "$u" 2>/dev/null | awk -F": " "/^Last password change/{print \$2}")
          [ "$d" = "never" ] || [ -z "$d" ] && continue
          ts=$(date -d "$d" +%s 2>/dev/null) || ts=0
          now=$(date +%s)
          if [ "$ts" -gt "$now" ]; then
            echo "future:$u:$d"
            bad=1
          fi
        done

        if [ "$bad" -eq 0 ]; then
          echo "No future password dates found"
          exit 0
        else
          exit 1
        fi
      '
    pass_if_regex:
      - '^No future password dates found$'
    fail_if_regex:
      - '^future:'

  - id: CIS-5.5.6
    name: "Ensure system accounts are secured"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
        min=$(awk "/^[[:space:]]*UID_MIN[[:space:]]+/{print \$2}" /etc/login.defs);

        excl_data=$(for u in {{ excluded_users | join(" ") }}; do
          shell=$(getent passwd "$u" | awk -F: "{print \$7}");
          [ -z "$shell" ] && shell="not_found";

          pstat=$(passwd -S "$u" 2>/dev/null | awk "{print \$2}");
          if [ "$pstat" = "L" ]; then
            locked="yes";
          elif [ -z "$pstat" ]; then
            locked="unknown";
          else
            locked="no";
          fi;

          echo "${u}:shell=${shell},locked=${locked}";
        done | paste -sd "; " -);

        awk -F: -v m="$min" \
            -v ex="^({{ excluded_users_regex }})$" \
            -v re="^(/usr)?/sbin/nologin(/)?$|^(/usr)?/bin/false(/)?$" \
        "
        BEGIN{bad=0}
        (\$3<m && \$1!~ex){
          if (\$7 !~ re) { print \"bad:\" \$1 \":\" \$7; bad=1 }
        }
        END{
          if(bad==0) {
            print \"All system accounts use nologin/false\"
          }
          exit bad
        }
        " /etc/passwd

        echo "exclusions=${excl_data}"
      '
    pass_if_regex:
      - '^All system accounts use nologin/false$'
    fail_if_regex:
      - '^bad:'

  - id: CIS-5.5.7
    name: "Ensure default group for the root account is GID 0"
    os_scope:
      - RHEL
      - OL
    command: "awk -F: '/^root:/{print $4}' /etc/passwd | grep -x 0"
    pass_if_regex: []
    fail_if_regex: []

  - id: CIS-5.5.8
    name: "Ensure default user umask is 027 or more restrictive"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      result=$(grep -Psi -- "^\h*umask\h+((\d{1,2}(\d[^7]|[^2-7]\d)\b)|(u=[rwx]{1,3},)?(((g=[rx]?[rx]?w[rx]?[rx]?\b)(,o=[rwx]{1,3})?)|((g=[wrx]{1,3},)?o=[wrx]{1,3}\b)))" /root/.bash_profile /root/.bashrc 2>/dev/null);

      if [ -z "$result" ]; then
        echo "PASS - No se encontraron umask menos restrictivos que 0027 en /root/.bash_profile y /root/.bashrc";
      else
        echo -e "FAIL - Se encontraron umask inseguros en archivos de root:\n$result";
        exit 1;
      fi
      '
    pass_if_regex:
      - "PASS"
    fail_if_regex:
      - "FAIL"

  - id: CIS-5.5.9
    name: "Ensure default user shell timeout is 900 seconds or less"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc '
      files="/etc/bashrc /etc/profile /etc/profile.d/*.sh";

      tmout=$(grep -Po "^\s*TMOUT=\d+" $files 2>/dev/null | head -1 | cut -d= -f2);
      readonly_set=$(grep -P "^\s*(readonly\s+TMOUT|typeset\s+-xr\s+TMOUT=)" $files 2>/dev/null | head -1);
      export_set=$(grep -P "^\s*(export\s+TMOUT|typeset\s+-xr\s+TMOUT=)" $files 2>/dev/null | head -1);

      if [ -z "$tmout" ]; then
        echo "FAIL - TMOUT no está configurado";
        exit 1;
      fi;

      if [ "$tmout" -le 0 ] || [ "$tmout" -gt 900 ]; then
        echo "FAIL - TMOUT incorrecto: $tmout (debe ser <=900 y >0)";
        exit 1;
      fi;

      if [ -z "$readonly_set" ]; then
        echo "FAIL - TMOUT no está en readonly";
        exit 1;
      fi;

      if [ -z "$export_set" ]; then
        echo "FAIL - TMOUT no está en export";
        exit 1;
      fi;

      echo "PASS - TMOUT=$tmout correctamente configurado (readonly/export)"
      '
    pass_if_regex:
      - "PASS"
    fail_if_regex:
      - "FAIL"

  - id: CIS-5.5.10
    name: "Ensure root login is restricted to system console"
    os_scope:
      - RHEL
      - OL
    command: "bash -lc 'echo not_applicable'"
    pass_if_regex:
      - '^not_applicable$'
    fail_if_regex: []