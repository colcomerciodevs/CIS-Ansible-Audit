    ######################################################################
  # Sección 5.1 - Jobs programados (cron/at)
  ######################################################################

  - id: CIS-5.1.1
    name: "crond habilitado (systemctl)"
    os_scope:
      - RHEL
      - OL
    command: >
      bash -lc 'v=$(systemctl is-enabled crond 2>/dev/null || true);
      if [ -n "$v" ]; then
        echo "crond=$v";
        [[ "$v" =~ ^(enabled|static|generated|alias)$ ]] && exit 0 || exit 1;
      else
        echo "crond=unknown";
        exit 1;
      fi'
    pass_if_regex:
      - '^crond=enabled$'
      - '^crond=static$'
      - '^crond=generated$'
      - '^crond=alias$'
    fail_if_regex:
      - '^crond=unknown$'
      - '^crond=disabled$'
      - '^crond=masked$'

  - id: CIS-5.1.2
