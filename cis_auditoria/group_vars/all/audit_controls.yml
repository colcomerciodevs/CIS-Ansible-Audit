---
# =============================================================================
# CIS Benchmark Audit Controls
# Oracle Linux / Red Hat Enterprise Linux 8-9
# =============================================================================
#
# Cada control contiene:
#
# id: ID del control CIS
# name: descripción del control
# os_scope: sistemas operativos aplicables
# command: comando de validación
# pass_if_regex: patrones que indican cumplimiento
# fail_if_regex: patrones que indican incumplimiento
#
# Si pass_if_regex está vacío → rc == 0 indica cumplimiento
# Si fail_if_regex coincide → el control falla
#
# Si stdout devuelve "not_applicable" → estado "NO APLICA"
# =============================================================================


audit_controls:

  ######################################################################
  # Sección 1.1 - Configuración del Sistema de Archivos
