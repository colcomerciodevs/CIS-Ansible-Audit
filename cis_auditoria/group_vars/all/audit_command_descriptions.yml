# ============================================================================
# Explicación de comandos - CIS Benchmark
# Oracle Linux / RHEL 8-9
# ============================================================================
# Este archivo mapea cada control (id) con la explicación funcional del comando
# usado en la auditoría.
# ============================================================================

audit_command_descriptions:

# ============================================================================
# SECTION PRE - Validaciones generales adicionales
# ============================================================================

  PRE-1: >-
    Valida que los usuarios administradores requeridos del sistema operativo
    (aromero, csotomonte y jcastano) existan en el servidor. La evidencia
    reporta el estado de cada cuenta y la información relacionada con el
    cambio de contraseña.

  PRE-2: >-
    Valida que los usuarios de automatización iacolcoauto, ansible_test y
    proactiva existan y tengan una regla de sudo con NOPASSWD: ALL definida
    en /etc/sudoers o /etc/sudoers.d.

  PRE-3: >-
    Valida que los usuarios iacolcoauto y ansible_test tengan configuradas
    las llaves SSH requeridas en su archivo authorized_keys, verificando la
    presencia exacta de cada clave pública esperada.

  PRE-4: >-
    Valida que el grupo ssh_access exista y que los usuarios tux, aromero,
    csotomonte, jcastano, iacolcoauto, ansible_test y proactiva pertenezcan
    a ese grupo.

  PRE-5: >-
    Control reservado para validaciones complementarias de automatización.
    Actualmente se marca como no aplicable.

# ============================================================================
# SECTION 1.1 - Filesystem Configuration
# ============================================================================

  CIS-1.1.1: >-
    Ejecuta en un subshell (bash -lc) una secuencia de validaciones sobre el
    módulo cramfs: primero inspecciona con modprobe -n -v si existe una regla
    install /bin/false o /bin/true (módulo deshabilitado → blocked, exit 0),
    luego verifica con lsmod si el módulo está cargado en el kernel (loaded,
    exit 1), después comprueba con modinfo -n si el módulo existe en el sistema
    (available, exit 1) y, si no existe, retorna absent (exit 0).

  CIS-1.1.2: >-
    Valida el estado del módulo squashfs en el sistema: primero verifica si está
    explícitamente bloqueado para carga mediante una regla install /bin/false o
    /bin/true (cumple → blocked), luego comprueba si el módulo está actualmente
    cargado en memoria (no cumple → loaded), y finalmente determina si el
    módulo existe en el sistema aunque no esté cargado (no cumple → available)
    o si no está presente (cumple → absent).

  CIS-1.1.3: >-
    Valida el estado del módulo udf en el sistema: primero verifica si está
    bloqueado para su carga mediante una regla install /bin/false o /bin/true
    (cumple → blocked), luego comprueba si el módulo está actualmente cargado
    en memoria (no cumple → loaded), y finalmente determina si el módulo existe
    en el sistema aunque no esté cargado (no cumple → available) o si no está
    presente (cumple → absent).

  CIS-1.1.4: >-
    Verifica si existe un sistema de archivos vfat definido en /etc/fstab,
    devolviendo present (no cumple) o absent (cumple) sin mostrar salida estándar ni errores.

  CIS-1.1.5: >-
    Consulta en la tabla de montajes del kernel si /tmp está montado y muestra
    sus detalles actuales.

  CIS-1.1.6: >-
    Extrae las opciones de montaje de /tmp, las separa por línea y valida si
    incluye la opción exacta nodev.

  CIS-1.1.7: >-
    Verifica si /tmp tiene configurada la opción de seguridad nosuid en sus
    flags de montaje.

  CIS-1.1.8: >-
    Comprueba si /tmp tiene habilitada la opción noexec para impedir ejecución
    de binarios.

  CIS-1.1.9: >-
    Valida si /dev/shm está montado en el kernel y muestra su configuración
    actual.

  CIS-1.1.10: >-
    Verifica si /dev/shm tiene la opción nodev configurada.

  CIS-1.1.11: >-
    Comprueba si /dev/shm tiene la opción nosuid.

  CIS-1.1.12: >-
    Valida si /dev/shm tiene la opción noexec.

  CIS-1.1.13: >-
    Consulta si /var está montado y muestra su configuración desde el kernel.

  CIS-1.1.14: >-
    Verifica si /var tiene la opción nodev.

  CIS-1.1.15: >-
    Comprueba si /var tiene la opción nosuid.

  CIS-1.1.16: >-
    Omitido no esta presente en el CIS BENCHMARK.

  CIS-1.1.17: >-
    Valida si /var/tmp está montado y obtiene su configuración actual.

  CIS-1.1.18: >-
    Verifica si /var/tmp tiene la opción nodev.

  CIS-1.1.19: >-
    Comprueba si /var/tmp tiene la opción nosuid.

  CIS-1.1.20: >-
    Valida si /var/tmp tiene la opción noexec.

  CIS-1.1.21: >-
    Consulta si /var/log está montado en el kernel.

  CIS-1.1.22: >-
    Verifica si /var/log tiene la opción nodev.

  CIS-1.1.23: >-
    Comprueba si /var/log tiene la opción nosuid.

  CIS-1.1.24: >-
    Valida si /var/log tiene la opción noexec.

  CIS-1.1.25: >-
    Verifica si /var/log/audit está montado y muestra su estado.

  CIS-1.1.26: >-
    Comprueba si /var/log/audit tiene la opción nodev.

  CIS-1.1.27: >-
    Valida si /var/log/audit tiene la opción nosuid.

  CIS-1.1.28: >-
    Verifica si /var/log/audit tiene la opción noexec.

  CIS-1.1.29: >-
    Consulta si /home está montado en el kernel.

  CIS-1.1.30: >-
    Verifica si /home tiene la opción nodev.

  CIS-1.1.31: >-
    Comprueba si /home tiene la opción nosuid.

  CIS-1.1.32: >-
    Omitido no esta presente en el CIS BENCHMARK.

  CIS-1.1.33: >-
    Omitido no esta presente en el CIS BENCHMARK.
  CIS-1.1.34: >-
    Omitido no esta presente en el CIS BENCHMARK.

  CIS-1.1.35: >-
    Omitido no esta presente en el CIS BENCHMARK.

  CIS-1.1.36: >-
    Omitido no esta presente en el CIS BENCHMARK.

  CIS-1.1.37: >-
    Valida si existen directorios locales con permisos inseguros: recorre todos
    los puntos de montaje locales, busca directorios con permiso de escritura
    para otros (-perm -0002) que no tienen el sticky bit (! -perm -1000), y si
    encuentra al menos uno retorna error (exit 1 "RC=1" → no cumple); si no encuentra
    ninguno "RC=0" → cumple.

  CIS-1.1.38: >-
    Valida si el servicio autofs está instalado y habilitado en el sistema:
    primero verifica si existe la unidad autofs.service; si existe, consulta si
    está habilitada (enabled/disabled → salida informativa), y si no está
    instalada retorna not-installed → cumple.

  CIS-1.1.39: >-
    Valida si el módulo del kernel usb_storage (soporte para dispositivos de
    almacenamiento USB) está actualmente cargado en memoria: si está presente en
    lsmod → retorna loaded (no cumple), y si no está cargado → not-loaded
    (cumple).


# ============================================================================
# SECTION 1.7 - Command Line Warning Banners
# ============================================================================

  CIS-1.7.1: >-
    Valida que el archivo /etc/motd exista y no esté vacío utilizando la
    condición -s; si el archivo existe y tiene contenido retorna
    exists_and_not_empty (cumple), si no existe o está vacío retorna
    missing_or_empty (no cumple).

  CIS-1.7.2: >-
    Valida que el archivo /etc/issue exista y no esté vacío; si contiene texto
    retorna exists_and_not_empty (cumple), si está vacío o no existe retorna
    missing_or_empty (no cumple).

  CIS-1.7.3: >-
    Valida que el archivo /etc/issue.net exista y no esté vacío; si contiene
    información retorna exists_and_not_empty (cumple), si está vacío o no existe
    retorna missing_or_empty (no cumple).

  CIS-1.7.4: >-
    Verifica únicamente la existencia del archivo /etc/motd; si existe retorna
    exists (cumple), si no existe retorna missing (no cumple).

  CIS-1.7.5: >-
    Verifica únicamente la existencia del archivo /etc/issue; si existe retorna
    exists (cumple), si no existe retorna missing (no cumple).

  CIS-1.7.6: >-
    Verifica únicamente la existencia del archivo /etc/issue.net; si existe
    retorna exists (cumple), si no existe retorna missing (no cumple).


  # ============================================================================
# SECTION 2.1 - Time Synchronization and Special Purpose Services
# ============================================================================

  CIS-2.1.1: >-
    Valida si el paquete chrony está instalado en el sistema; si está
    instalado, rpm -q muestra la versión del paquete (cumple), y si no está
    instalado indica que no está presente (no cumple).

  CIS-2.1.2: >-
    Verifica si los paquetes ntp y ntpdate están instalados; si ambos existen
    retorna present (no cumple), y si alguno falta retorna absent (cumple).

  CIS-2.1.3: >-
    Valida que en la configuración de chrony existan servidores o pools NTP
    definidos; si encuentra entradas válidas retorna cumplimiento, y si no hay
    configuración retorna no cumple, NOTA: 10.181.0.155 es el servidor NTP central.

  CIS-2.1.4: >-
    Valida si el paquete xinetd está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.1.5: >-
    Valida si el paquete xorg-x11-server-common está instalado en el sistema;
    si existe retorna present (no cumple), y si no está instalado retorna
    absent (cumple).

  CIS-2.1.6: >-
    Valida si los paquetes avahi-autoipd y avahi están instalados; si ambos
    existen retorna present (no cumple), y si alguno no está instalado retorna
    absent (cumple).

  CIS-2.1.7: >-
    Valida si el paquete cups está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.1.8: >-
    Valida si el paquete dhcp-server está instalado en el sistema; si existe
    retorna present (no cumple), y si no está instalado retorna absent
    (cumple).

  CIS-2.1.9: >-
    Omitida.

  CIS-2.1.10: >-
    Valida si el servicio nfs-server está habilitado en el sistema; si aparece
    como enabled (no cumple), y si está deshabilitado o no existe retorna
    disabled (cumple).

  CIS-2.1.11: >-
    Valida si el paquete bind está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.1.12: >-
    Valida si el paquete ftp está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.1.13: >-
    Valida si el paquete vsftpd está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.1.14: >-
    Valida si el paquete tftp-server está instalado en el sistema; si existe
    retorna present (no cumple), y si no está instalado retorna absent
    (cumple).

  CIS-2.1.15: >-
    Valida si alguno de los paquetes httpd o nginx está instalado en el
    sistema; si encuentra ambos retorna present (no cumple), y si falta alguno
    retorna absent (cumple según la lógica exacta del comando).

  CIS-2.1.16: >-
    Valida si los paquetes dovecot y cyrus-imapd están instalados; si ambos
    existen retorna present (no cumple), y si alguno no está instalado retorna
    absent (cumple).

  CIS-2.1.17: >-
    Valida si el paquete samba está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.1.18: >-
    Valida si el paquete squid está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.1.19: >-
    Valida si el paquete net-snmp está instalado en el sistema; si existe
    retorna present (no cumple), y si no está instalado retorna absent
    (cumple).

  CIS-2.1.20: >-
    Valida si existe algún servicio escuchando en el puerto 25/TCP en
    direcciones distintas de loopback; si encuentra un listener externo retorna
    open (no cumple), y si no encuentra exposición externa retorna closed
    (cumple).

  CIS-2.1.21: >-
    Valida si el paquete telnet-server está instalado en el sistema; si existe
    retorna present (no cumple), y si no está instalado retorna absent
    (cumple).

  CIS-2.1.22: >-
    Valida si el paquete rsync está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.1.23: >-
    Valida si el paquete ypserv está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

# ============================================================================
# SECTION 2.2 - Client Services
# ============================================================================

  CIS-2.2.1: >-
    Valida si el paquete ypbind está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.2.2: >-
    Valida si el paquete rsh está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.2.3: >-
    Valida si el paquete talk está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.2.4: >-
    Valida si el paquete telnet está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.2.5: >-
    Valida si el paquete openldap-clients está instalado en el sistema; si
    existe retorna present (no cumple), y si no está instalado retorna absent
    (cumple).

  CIS-2.2.6: >-
    Valida si el paquete tftp está instalado en el sistema; si existe retorna
    present (no cumple), y si no está instalado retorna absent (cumple).

  CIS-2.2.7: >-
    Valida si el paquete rpcbind está instalado en el sistema; si existe
    retorna present (no cumple), y si no está instalado retorna absent
    (cumple).

# ============================================================================
# SECTION 3.1 - Network Parameters (Host Only)
# ============================================================================

  CIS-3.1.1: >-
    Valida si en la configuración de sysctl están definidos los parámetros
    net.ipv6.conf.all.disable_ipv6 y net.ipv6.conf.default.disable_ipv6;
    si existen entradas configuradas → evidencia de deshabilitación de IPv6 "=1"
    (cumple según política), si no → no cumple.

  CIS-3.1.2: >-
    Verifica si existen interfaces de red inalámbricas en el sistema mediante
    la inspección de /sys/class/net. Si no se detectan interfaces wireless, el
    control se considera cumplido. En caso de existir, valida el estado del WiFi
    utilizando nmcli radio wifi: si está en estado disabled cumple, y si está
    habilitado (enabled) no cumple.

  # ============================================================================
# SECTION 3.2 - Network Parameters (IPv4)
# ============================================================================

  CIS-3.2.1: >-
    Valida que send_redirects esté deshabilitado en IPv4 (all y default en 0);
    primero verifica el valor en ejecución con sysctl y, si no cumple, valida
    si está configurado de forma persistente en sysctl.conf o sysctl.d; si
    cumple en runtime o persistencia → cumple, si no → no cumple.

  CIS-3.2.2: >-
    Valida que el reenvío de paquetes IPv4 (ip_forward) esté deshabilitado;
    si el valor es 0 o está configurado de forma persistente → cumple, si está
    habilitado → no cumple.

# ============================================================================
# SECTION 3.3 - Network Parameters (IPv4 Hardening)
# ============================================================================

  CIS-3.3.1: >-
    Valida que accept_source_route esté deshabilitado en IPv4 (all y default en 0);
    si ambos valores están en 0 o configurados de forma persistente → cumple,
    si no → no cumple.

  CIS-3.3.2: >-
    Valida que accept_redirects esté deshabilitado en IPv4 (all y default en 0);
    si cumple en ejecución o está persistido → cumple, si no → no cumple.

  CIS-3.3.3: >-
    Valida que secure_redirects esté deshabilitado en IPv4 (all y default en 0);
    si cumple o está configurado de forma persistente → cumple, si no → no cumple.

  CIS-3.3.4: >-
    Valida que el sistema registre paquetes sospechosos (log_martians) en IPv4;
    si los valores all y default están en 1 o persistidos → cumple, si no → no cumple.

  CIS-3.3.5: >-
    Valida que el sistema ignore respuestas ICMP a broadcast
    (icmp_echo_ignore_broadcasts=1); si está activo o persistido → cumple,
    si no → no cumple.

  CIS-3.3.6: >-
    Valida que el sistema ignore respuestas ICMP inválidas
    (icmp_ignore_bogus_error_responses=1); si está activo o persistido → cumple,
    si no → no cumple.

  CIS-3.3.7: >-
    Valida que el filtro de rutas inversas (rp_filter) esté configurado en modo
    seguro (1 o 2) para all y default; si cumple o está persistido → cumple,
    si no → no cumple.

  CIS-3.3.8: >-
    Valida que la protección contra ataques SYN flood (tcp_syncookies) esté
    habilitada; si el valor es 1 o está configurado de forma persistente →
    cumple, si no → no cumple.

  CIS-3.3.9: >-
    El control valida la configuración del parámetro accept_ra para IPv6 en las
    interfaces all y default. Si IPv6 se encuentra deshabilitado en el sistema,
    el control se considera no aplicable. En caso contrario, se verifica que el
    valor de accept_ra esté configurado en 0 tanto en ejecución como de forma
    persistente. El control falla si alguno de estos parámetros se encuentra
    habilitado.

# ============================================================================
# SECTION 3.4 - Uncommon Network Protocols
# ============================================================================

  CIS-3.4.1: >-
    Valida el estado del módulo del kernel dccp; si está bloqueado mediante
    modprobe (install /bin/false o true) lo marca como blocked → cumple, si está cargado o disponible
    en el sistema → no cumple, y si no existe → cumple.

  CIS-3.4.2: >-
    Valida el estado del módulo del kernel sctp; si está bloqueado "blocked" → cumple,
    si está cargado o disponible → no cumple, y si no existe → cumple.

  CIS-3.4.3: >-
    Omitida.

  CIS-3.4.4: >-
    Omitida.


# ============================================================================
# SECTION 5.1 - Cron Configuration
# ============================================================================

  CIS-5.1.1: >-
    Valida que el servicio crond esté habilitado en el sistema; si retorna
    enabled, static o equivalente → cumple, si está deshabilitado o desconocido
    → no cumple.

  CIS-5.1.2: >-
    Valida los permisos, propietario y grupo del archivo /etc/crontab
    utilizando stat; se usa para verificar que tenga configuración segura
    (por ejemplo modo 600/640 y owner root).

  CIS-5.1.3: >-
    Valida los permisos, propietario y grupo del directorio /etc/cron.hourly;
    asegura que tenga configuración segura (700 root:root).

  CIS-5.1.4: >-
    Valida los permisos, propietario y grupo del directorio /etc/cron.daily;
    asegura que tenga configuración segura (700 root:root).

  CIS-5.1.5: >-
    Valida los permisos, propietario y grupo del directorio /etc/cron.weekly;
    asegura que tenga configuración segura (700 root:root).

  CIS-5.1.6: >-
    Valida los permisos, propietario y grupo del directorio /etc/cron.monthly;
    asegura que tenga configuración segura (700 root:root).

  CIS-5.1.7: >-
    Valida los permisos, propietario y grupo del directorio /etc/cron.d;
    asegura que tenga configuración segura (700 root:root).

  CIS-5.1.8: >-
    Valida que /etc/cron.allow exista con permisos 600 y que /etc/cron.deny no
    exista; si ambas condiciones se cumplen → cumple, si no → no cumple 
    NOTA= deben haber exclusiones presentes para user: root-tux (administradores Globales Linux).

  CIS-5.1.9: >-
    Valida que /etc/at.allow exista con permisos 600 y que /etc/at.deny no
    exista; si ambas condiciones se cumplen → cumple, si no → no cumple 
    NOTA= deben haber exclusiones presentes para user: root-tux (administradores Globales Linux).

# ============================================================================
# SECTION 5.2 - Sudo Configuration
# ============================================================================

  CIS-5.2.1: >-
    Valida si el paquete sudo está instalado en el sistema; si existe → cumple,
    si no → no cumple.

  CIS-5.2.2: >-
    Valida que en la configuración de sudoers esté habilitado el uso de
    pseudo-terminal (use_pty); si está configurado → cumple, si no → no cumple.

  CIS-5.2.3: >-
    Valida que sudo registre logs mediante la directiva logfile; si está
    configurado → cumple, si no → no cumple.

  CIS-5.2.4: >-
    Valida que no existan reglas NOPASSWD para usuarios no autorizados en
    sudoers; si no hay coincidencias indebidas → cumple, si existen → no cumple 
    NOTA= deben haber exclusiones presentes para user: tux (administrador Global Linux)
    NOTA= deben haber exclusiones presentes para user: ansible_test - iacolcoauto (Automatizacion)


  CIS-5.2.5: >-
    Valida que no exista la opción !authenticate en sudoers (evita autenticación);
    si no existe "RC=0" → cumple, si existe → no cumple.

  CIS-5.2.6: >-
    Muestra el valor de timestamp_timeout en sudoers para controlar la duración
    de la sesión privilegiada; el cumplimiento depende de la política definida (VALOR = 15).

  CIS-5.2.7: >-
    Valida que el uso de su esté restringido mediante pam_wheel (use_uid o group);
    si está configurado → cumple, si no → no cumple.
    NOTA= deben haber exclusiones presentes para user: tux,aromero,csotomonte,jcastano (administrador nombrado Linux)
   

  CIS-5.2.8: >-
    Verifica el perfil activo configurado en authselect y valida que los archivos
    system-auth y password-auth asociados al perfil existan. Posteriormente,
    comprueba que dichos archivos incluyan los módulos PAM requeridos
    (pam_pwquality, pam_pwhistory, pam_faillock y pam_unix). El control cumple si
    el perfil es válido y contiene todos los módulos definidos; falla si no se
    encuentran los archivos o falta alguno de los módulos requeridos.

  CIS-5.2.9: >-
    Valida que el módulo pam_faillock esté presente en PAM (password-auth y
    system-auth); si está configurado → cumple, si no → no cumple.

# ============================================================================
# SECTION 5.3 - SSH Configuration
# ============================================================================

  CIS-5.3.1: >-
    El control valida la configuración de seguridad del archivo
    /etc/ssh/sshd_config mediante la verificación de su existencia, permisos,
    propietario y grupo. Se asegura que el archivo tenga permisos restrictivos
    (no más permisivos que 600) y pertenezca al usuario y grupo root. El control
    falla si alguna de estas condiciones no se cumple.

  CIS-5.3.2: >-
    El control valida la seguridad de las claves privadas de host SSH ubicadas
    en /etc/ssh, verificando que correspondan a archivos válidos de tipo OpenSSH
    private key. Se asegura que cada clave tenga permisos restrictivos,
    pertenezca al usuario root y al grupo root o a un grupo autorizado de SSH.
    El control falla si alguna clave no cumple con estos criterios de seguridad.

  CIS-5.3.3: >-
    Identifica las claves públicas de host SSH en /etc/ssh y valida que
    correspondan a archivos de tipo clave pública OpenSSH. Para cada archivo
    encontrado, verifica que los permisos no permitan accesos indebidos, y que
    el propietario y grupo sean root. El control cumple si todas las claves
    públicas cumplen con estas condiciones; falla si alguna presenta permisos,
    owner o grupo incorrectos.

  CIS-5.3.4: >-
    Valida si existen directivas AllowUsers, AllowGroups, DenyUsers o DenyGroups
    en sshd_config; si existen → cumple, si no → no cumple.
    NOTA= el grupo que permite el acceso ssh debe ser AllowGroups = ssh_access

  CIS-5.3.5: >-
    Valida que el nivel de log de SSH esté en INFO o VERBOSE; si coincide →
    cumple, si no → no cumple.

  CIS-5.3.6: >-
    Valida que X11Forwarding esté deshabilitado; si retorna no  → cumple,
    si está habilitado "RC=1" → no cumple.

  CIS-5.3.7: >-
    Valida que MaxAuthTries esté entre 1 y 4; si cumple → cumple, si no →
    no cumple.

  CIS-5.3.8: >-
    Valida que IgnoreRhosts esté habilitado; si retorna yes → cumple,
    si no → no cumple.

  CIS-5.3.9: >-
    Valida que HostbasedAuthentication esté deshabilitado; si retorna no →
    cumple, si no → no cumple.

  CIS-5.3.10: >-
    Valida que PermitRootLogin esté configurado como no o prohibit-password;
    si cumple → cumple, si no → no cumple.

  CIS-5.3.11: >-
    Valida que no se permitan contraseñas vacías (PermitEmptyPasswords no);
    si cumple → cumple, si no → no cumple.

  CIS-5.3.12: >-
    Valida que PermitUserEnvironment esté deshabilitado; si cumple → cumple,
    si no → no cumple.

  CIS-5.3.13: >-
    Muestra los valores de ClientAliveInterval y ClientAliveCountMax para
    controlar sesiones inactivas; cumplimiento depende de política.
    NOTA = estos son los valores que debe de tener = clientaliveinterval 900 | clientalivecountmax 3

  CIS-5.3.14: >-
    Muestra el valor de LoginGraceTime para validar el tiempo permitido de login;
    cumplimiento depende de política.
    NOTA = estos son los valores que debe de tener = logingracetime 60

  CIS-5.3.15: >-
    Valida que SSH tenga configurado un banner distinto de none; si existe →
    cumple, si no → no cumple.

  CIS-5.3.16: >-
    Valida que UsePAM esté habilitado en SSH; si retorna yes → cumple,
    si no → no cumple.

  CIS-5.3.17: >-
    Omitido no esta presente en el CIS BENCHMARK.

  CIS-5.3.18: >-
    Muestra el valor de MaxStartups para validar control de conexiones;
    cumplimiento depende de política.
    NOTA = estos son los valores que debe de tener = maxstartups 10:30:60

  CIS-5.3.19: >-
    Valida que MaxSessions esté entre 1 y 10; si cumple → cumple,
    si no → no cumple.

# ============================================================================
# SECTION 5.4 - PAM Configuration
# ============================================================================

  CIS-5.4.1: >-
    Valida la configuración de políticas de complejidad de contraseñas mediante
    los archivos /etc/security/pwquality.conf y pwquality.conf.d. Verifica que
    el parámetro difok sea mayor o igual a 2, que minlen sea mayor o igual a 14,
    y que los parámetros dcredit, ucredit, lcredit y ocredit estén definidos con
    valores negativos (no 0 ni positivos), asegurando la inclusión obligatoria de
    diferentes tipos de caracteres. El control cumple si todos los parámetros
    cumplen estas condiciones; falla si alguno no se encuentra definido o no
    cumple los valores esperados.
    NOTA = difok = 2 , minlen = 14 , minclass = 4 , 
    dcredit, ucredit, lcredit, and ocredit are not set to 0 or greater

  CIS-5.4.2: >-
    Valida que faillock tenga parámetros deny (1-5) y unlock_time definidos;
    si ambos existen → cumple, si no → no cumple.
    NOTA = estos son los valores que debe de tener - deny = 5 | unlock_time = 900

  CIS-5.4.3: >-
    Valida la configuración del historial de contraseñas mediante el archivo
    /etc/security/pwhistory.conf, verificando que el parámetro remember esté
    configurado con un valor mayor o igual a 24. Adicionalmente, comprueba que
    el parámetro remember no esté definido dentro del módulo pam_pwhistory.so en
    los archivos system-auth y password-auth, asegurando que la configuración se
    gestione de forma centralizada. El control cumple si ambas condiciones se
    satisfacen; falla si el valor es menor al esperado o si se define en PAM.

  CIS-5.4.4: >-
    Valida el perfil activo configurado en authselect y verifica en los archivos
    password-auth y system-auth asociados que el módulo pam_unix.so esté
    configurado con algoritmos de hash seguros para contraseñas (sha512 o
    yescrypt). El control cumple si ambos archivos contienen esta configuración;
    falla si no se puede identificar el perfil activo, si la ruta del perfil no
    existe o si alguno de los archivos no incluye pam_unix.so con dichos
    algoritmos.

# ============================================================================
# SECTION 5.5 - Password Policy and Accounts
# ============================================================================

  CIS-5.5.1: >-
    Valida que PASS_MAX_DAYS sea menor o igual a 365; si cumple → cumple,
    si no → no cumple.
    NOTA = debe estar en 42

  CIS-5.5.2: >-
    Valida que PASS_MIN_DAYS sea mayor o igual a 1; si cumple → cumple,
    si no → no cumple.

  CIS-5.5.3: >-
    Valida que PASS_WARN_AGE sea mayor o igual a 7; si cumple → cumple,
    si no → no cumple.

  CIS-5.5.4: >-
    Valida que INACTIVE esté entre 0 y 30 días para cuentas nuevas;
    si cumple → cumple, si no → no cumple.

  CIS-5.5.5: >-
    Valida que no existan usuarios con fecha de cambio de contraseña en el
    futuro; si no hay casos → cumple, si existen → no cumple.

  CIS-5.5.6: >-
    Valida que las cuentas del sistema (UID < UID_MIN) tengan configurado
    un shell de no login como /usr/sbin/nologin o /usr/bin/false; si todas
    las cuentas cumplen esta condición → cumple, si alguna permite acceso
    interactivo (por ejemplo /bin/bash) → no cumple.
    NOTA:Se excluyen de esta validación ciertas cuentas técnicas y administrativas
    que, aunque pueden tener UID bajo, son necesarias para la operación del
    sistema o de aplicaciones. Estas cuentas no deben ser modificadas:
      - root: superusuario del sistema
      - tux: usuario administrador global
      - proactiva: usuario de monitoreo
      - iacolcoauto: usuario de automatización NTTDATA
      - ansible_test: usuario de automatización
      - halt: cuenta interna del sistema
      - shutdown: cuenta interna del sistema
      - sync: sincronización de buffers de disco
      - nfsnobody: usuario de seguridad para NFS

  CIS-5.5.7: >-
    Valida que el usuario root tenga grupo primario GID 0; si cumple →
    cumple, si no → no cumple.

  CIS-5.5.8: >-
    Verifica en los archivos de configuración de shell del usuario root
    (/root/.bash_profile y /root/.bashrc) que no existan valores de umask
    menos restrictivos que 0027. El control cumple si no se detectan umask
    inseguros; falla si se encuentran configuraciones que permitan permisos
    más abiertos de lo recomendado.

  CIS-5.5.9: >-
    Verifica en los archivos globales de perfil de shell (/etc/bashrc,
    /etc/profile y /etc/profile.d/*.sh) que el parámetro TMOUT esté configurado
    con un valor mayor a 0 y menor o igual a 900, y que además se encuentre
    definido como readonly y exportado. El control cumple si se satisfacen todas
    estas condiciones; falla si TMOUT no está configurado, tiene un valor fuera
    del rango permitido o no está declarado como readonly y export.

  CIS-5.5.10: >-
    Omitido no esta presente en el CIS BENCHMARK.