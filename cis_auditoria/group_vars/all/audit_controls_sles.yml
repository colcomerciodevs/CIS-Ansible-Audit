  - id: CIS-1.1.1
    name: "Ensure cramfs kernel module is not available"
    os_scope:
      - SLES
    command: >
      bash -lc '
        if modprobe --showconfig 2>/dev/null | grep -Pq "^\h*install\h+cramfs\h+(/usr)?/bin/(true|false)\b"; then
          echo blocked;
          exit 0;
        fi;
        if modprobe --showconfig 2>/dev/null | grep -Pq "^\h*blacklist\h+cramfs\b"; then
          if ! lsmod | awk "{print \$1}" | grep -qx cramfs; then
            echo blocked;
            exit 0;
          fi;
        fi;
        if lsmod | awk "{print \$1}" | grep -qx cramfs; then
          echo loaded;
          exit 1;
        fi;
        if modinfo -n cramfs >/dev/null 2>&1; then
          echo available;
          exit 1;
        else
          echo absent;
          exit 0;
        fi'
    pass_if_regex:
      - "^blocked$"
      - "^absent$"
    fail_if_regex:
      - "^loaded$"
      - "^available$"

