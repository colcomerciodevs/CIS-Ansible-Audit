      sysctl net.ipv4.conf.default.accept_redirects | grep -q "= 0" &&
      echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-3.3.3
    name: "Ensure secure ICMP redirects are not accepted"
    os_scope: [SLES]
    command: >
