  - id: CIS-3.3.5
    name: "Ensure broadcast ICMP requests are ignored"
    os_scope: [SLES]
    command: "sysctl net.ipv4.icmp_echo_ignore_broadcasts | grep -q '= 1' && echo PASS || echo FAIL"
    pass_if_regex: ["PASS"]
