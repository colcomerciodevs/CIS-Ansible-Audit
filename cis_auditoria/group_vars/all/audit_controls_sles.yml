      sysctl net.ipv4.conf.default.accept_source_route | grep -q "= 0" &&
      echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-3.3.2
