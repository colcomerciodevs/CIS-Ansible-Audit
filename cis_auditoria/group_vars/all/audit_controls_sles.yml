  ######################################################################
  # Sección 5.2 - Sudo / Authselect 
  ######################################################################

  - id: CIS-5.2.1
    name: "Ensure sudo is installed"
    os_scope: [SLES]
    command: "rpm -q sudo >/dev/null 2>&1 && echo PASS || echo FAIL"
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.2.2
    name: "Ensure sudo commands use pty"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -REi "^[[:space:]]*Defaults[[:space:]]+([^#]+,)?use_pty" /etc/sudoers /etc/sudoers.d/* 2>/dev/null &&
      echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.2.3
    name: "Ensure sudo log file exists"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -REi "^[[:space:]]*Defaults[[:space:]]+logfile=" /etc/sudoers /etc/sudoers.d/* 2>/dev/null &&
      echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.2.4
    name: "Ensure users must provide password for privilege escalation"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -REi "^[^#].*NOPASSWD" /etc/sudoers /etc/sudoers.d/* 2>/dev/null &&
      echo FAIL || echo PASS
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.2.5
    name: "Ensure re-authentication for privilege escalation is not disabled globally"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -REi "^[[:space:]]*Defaults[[:space:]]+!authenticate" /etc/sudoers /etc/sudoers.d/* 2>/dev/null &&
      echo FAIL || echo PASS
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.2.6
    name: "Ensure sudo authentication timeout is configured correctly"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -REi "^[[:space:]]*Defaults[[:space:]]+timestamp_timeout=([0-9]|1[0-5])\b" /etc/sudoers /etc/sudoers.d/* 2>/dev/null &&
      echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.2.7
    name: "Ensure access to the su command is restricted"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -Eq "^[[:space:]]*auth[[:space:]]+required[[:space:]]+pam_wheel\.so[[:space:]].*use_uid" /etc/pam.d/su &&
      echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.2.8
    name: "Ensure custom authselect profile is used"
    os_scope: [SLES]
    command: "bash -lc 'echo not_applicable'"
    pass_if_regex:
      - '^not_applicable$'
    fail_if_regex: []

  - id: CIS-5.2.9
    name: "Ensure authselect includes with-faillock"
    os_scope: [SLES]
    command: "bash -lc 'echo not_applicable'"
    pass_if_regex:
      - '^not_applicable$'
    fail_if_regex: []

  ######################################################################
  # Sección 5.3 - SSH
  ######################################################################

  - id: CIS-5.3.1
    name: "Ensure permissions on /etc/ssh/sshd_config are configured"
    os_scope: [SLES]
    command: "stat -Lc '%a' /etc/ssh/sshd_config | grep -qE '600|400' && echo PASS || echo FAIL"
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.3.2
    name: "Ensure SSH private host key files permissions are configured"
    os_scope: [SLES]
    command: >
      bash -lc '
      find /etc/ssh -name "ssh_host_*_key" -exec stat -Lc "%a" {} \; | grep -vqE "600|400" \
        && echo FAIL || echo PASS
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.3.3
    name: "Ensure SSH public host key files permissions are configured"
    os_scope: [SLES]
    command: >
      bash -lc '
      find /etc/ssh -name "ssh_host_*_key.pub" -exec stat -Lc "%a" {} \; | grep -vqE "644|600" \
        && echo FAIL || echo PASS
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.3.4
    name: "Ensure SSH access is limited"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -Ei "AllowUsers|AllowGroups|DenyUsers|DenyGroups" /etc/ssh/sshd_config /etc/ssh/sshd_config.d/* 2>/dev/null \
        && echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.3.5
    name: "Ensure SSH LogLevel is appropriate"
    command: "grep -Ei '^LogLevel (VERBOSE|INFO)' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.6
    name: "Ensure SSH X11 forwarding is disabled"
    command: "grep -Ei '^X11Forwarding no' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.7
    name: "Ensure SSH MaxAuthTries is set to 4 or less"
    command: "grep -Ei '^MaxAuthTries [1-4]' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.8
    name: "Ensure SSH IgnoreRhosts is enabled"
    command: "grep -Ei '^IgnoreRhosts yes' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.9
    name: "Ensure SSH HostbasedAuthentication is disabled"
    command: "grep -Ei '^HostbasedAuthentication no' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.10
    name: "Ensure SSH root login is disabled"
    command: "grep -Ei '^PermitRootLogin no' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.11
    name: "Ensure SSH PermitEmptyPasswords is disabled"
    command: "grep -Ei '^PermitEmptyPasswords no' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.12
    name: "Ensure SSH PermitUserEnvironment is disabled"
    command: "grep -Ei '^PermitUserEnvironment no' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.13
    name: "Ensure SSH Idle Timeout Interval is configured"
    command: "grep -Ei 'ClientAliveInterval' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.14
    name: "Ensure SSH LoginGraceTime is set to 60 seconds or less"
    command: "grep -Ei '^LoginGraceTime (60|[1-5][0-9])' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.15
    name: "Ensure SSH warning banner is configured"
    command: "grep -Ei '^Banner' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.16
    name: "Ensure SSH PAM is enabled"
    command: "grep -Ei '^UsePAM yes' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.17
    name: "Ensure SSH AllowTcpForwarding is disabled"
    command: "grep -Ei '^AllowTcpForwarding no' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.18
    name: "Ensure SSH MaxStartups is configured"
    command: "grep -Ei '^MaxStartups' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  - id: CIS-5.3.19
    name: "Ensure SSH MaxSessions is limited"
    command: "grep -Ei '^MaxSessions' /etc/ssh/sshd_config* && echo PASS || echo FAIL"

  ######################################################################
  # Sección 5.4 - PAM SLES
  ######################################################################

  - id: CIS-5.4.0
    name: "Ensure latest version of pam is installed"
    os_scope: [SLES]
    command: >
      bash -lc '
      rpm -q pam && echo PASS || { echo FAIL; exit 1; }
      '
    pass_if_regex:
      - "PASS"
    fail_if_regex:
      - "FAIL"

  - id: CIS-5.4.1
    name: "Ensure password creation requirements are configured"
    os_scope: [SLES]
    command: >
      bash -lc '
      fail=0
      out=""

      minlen_line=$(grep -Psi -- "^\h*minlen\h*=\h*(8|9|[1-9][0-9]+)\b" /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null | head -n1)
      minclass_line=$(grep -Psi -- "^\h*minclass\h*=\h*4\b" /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null | head -n1)

      [ -n "$minlen_line" ] && out="$out\n- minlen cumple: $minlen_line" || { out="$out\n- minlen NO cumple"; fail=1; }
      [ -n "$minclass_line" ] && out="$out\n- minclass cumple: $minclass_line" || { out="$out\n- minclass NO cumple"; fail=1; }

      [ "$fail" -eq 0 ] && echo -e "PASS$out" || { echo -e "FAIL$out"; exit 1; }
      '
    pass_if_regex:
      - "PASS"
    fail_if_regex:
      - "FAIL"

  - id: CIS-5.4.2
    name: "Ensure password lockout is configured for 5 attempts"
    os_scope: [SLES]
    command: >
      bash -lc '
      line=$(grep -Pi -- "^\h*deny\h*=\h*[1-5]\b" /etc/security/faillock.conf 2>/dev/null | head -n1)

      if [ -n "$line" ]; then
        echo "PASS - $line"
      else
        echo "FAIL - /etc/security/faillock.conf no tiene deny entre 1 y 5"
        exit 1
      fi
      '
    pass_if_regex:
      - "PASS"
    fail_if_regex:
      - "FAIL"

  - id: CIS-5.4.3
    name: "Ensure password reuse is limited to 24"
    os_scope: [SLES]
    command: >
      bash -lc '
      pam-config --query --pwhistory --pwhistory-remember \
        | grep -E "remember\s*=\s*(2[4-9]|[3-9][0-9])" \
        && echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.4.3.1
    name: "Ensure pam_pwhistory includes use_authtok"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -P -- "^\h*password\h+([^#\n\r]+)\h+pam_pwhistory\.so\h+([^#\n\r]+\h+)?use_authtok\b" /etc/pam.d/* \
        && echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.4.4
    name: "Ensure password hashing algorithm is SHA-512 or yescrypt"
    os_scope: [SLES]
    command: >
      bash -lc '
      pam-config --query --unix \
        | grep -E "sha512|yescrypt" \
        && echo PASS || echo FAIL
      '
    pass_if_regex:
      - "PASS"
    fail_if_regex:
      - "FAIL"

  - id: CIS-5.4.4.1
    name: "Ensure pam_unix does not include nullok"
    os_scope: [SLES]
    command: >
      bash -lc '
      pam-config --query --unix --unix-nullok 2>/dev/null \
        | grep -qi "nullok" && { echo FAIL; exit 1; } || echo PASS
      '
    pass_if_regex:
      - "PASS"
    fail_if_regex:
      - "FAIL"

  ######################################################################
  # Sección 5.5 - User Accounts & Environment
  ######################################################################

  - id: CIS-5.5.1
    name: "Ensure password expiration is 42 days or less"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -Pi "^\h*PASS_MAX_DAYS\h+([1-9]|[1-3][0-9]|4[0-2])\b" /etc/login.defs \
        && echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.5.2
    name: "Ensure minimum days between password changes is 3"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -Pi "^\h*PASS_MIN_DAYS\h+([3-9]|[1-9][0-9])\b" /etc/login.defs \
        && echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.5.3
    name: "Ensure password expiration warning days is 5 or more"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -Pi "^\h*PASS_WARN_AGE\h+([5-9]|[1-9][0-9])\b" /etc/login.defs \
        && echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.5.4
    name: "Ensure inactive password lock is 30 days or less"
    os_scope: [SLES]
    command: >
      bash -lc '
      useradd -D | grep -E "INACTIVE=([1-9]|[1-2][0-9]|30)\b" \
        && echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.5.5
    name: "Ensure all users last password change date is in the past"
    os_scope: [SLES]
    command: >
      bash -lc '
      bad=0
      mapfile -t USERS < <(
        awk -F: '\''($2 !~ /^[!*]/){print $1}'\'' /etc/shadow 2>/dev/null |
        grep -Ev "^({{ excluded_users_regex | default('NO_MATCH_EXCLUDED_USERS') }})$" || true
      )

      for u in "${USERS[@]}"; do
        d=$(chage --list "$u" 2>/dev/null | awk -F": " "/^Last password change/{print \$2}")
        [ -z "$d" ] || [ "$d" = "never" ] && continue
        ts=$(date -d "$d" +%s 2>/dev/null) || ts=0
        now=$(date +%s)

        if [ "$ts" -gt "$now" ]; then
          echo "future:$u:$d"
          bad=1
        fi
      done

      [ "$bad" -eq 0 ] && echo PASS || exit 1
      '
    pass_if_regex: ["PASS"]
    fail_if_regex:
      - "^future:"

  - id: CIS-5.5.6
    name: "Ensure system accounts are secured"
    os_scope: [SLES]
    command: >
      bash -lc '
      min=$(awk "/^[[:space:]]*UID_MIN[[:space:]]+/{print \$2}" /etc/login.defs)
      [ -z "$min" ] && min=1000

      awk -F: -v min="$min" '\''($3 < min && $1 != "root"){print $1 ":" $7}'\'' /etc/passwd |
      grep -Ev "^({{ excluded_users_regex | default('NO_MATCH_EXCLUDED_USERS') }}):" |
      grep -Ev ":(/sbin/nologin|/usr/sbin/nologin|/bin/false)$" &&
      echo FAIL || echo PASS
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.5.7
    name: "Ensure root default group is GID 0"
    os_scope: [SLES]
    command: "id -g root | grep -q '^0$' && echo PASS || echo FAIL"
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.5.8
    name: "Ensure default user umask is 027 or more restrictive"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -RE "^\s*umask\s+(027|077)" /etc/profile /etc/bashrc /etc/profile.d/* 2>/dev/null \
        && echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.5.9
    name: "Ensure default user shell timeout is 900 seconds or less"
    os_scope: [SLES]
    command: >
      bash -lc '
      grep -RE "^\s*TMOUT=(900|[1-8][0-9]{2}|[1-9][0-9])" /etc/profile /etc/bashrc /etc/profile.d/* 2>/dev/null &&
      grep -RE "readonly TMOUT" /etc/profile /etc/bashrc /etc/profile.d/* 2>/dev/null &&
      grep -RE "export TMOUT" /etc/profile /etc/bashrc /etc/profile.d/* 2>/dev/null &&
      echo PASS || echo FAIL
      '
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.5.10
    name: "Ensure root login is restricted to system console"
    os_scope: [SLES]
    command: >
      bash -lc 'echo not_applicable'
    pass_if_regex:
      - '^not_applicable$'
    fail_if_regex: []