  ######################################################################
  # Sección 5.1 - Cron y at
  ######################################################################

  - id: CIS-5.1.1
    name: "Ensure cron daemon is enabled and running"
    os_scope: [SLES]
    command: >
      bash -lc '
      systemctl is-enabled cron 2>/dev/null | grep -q enabled &&
