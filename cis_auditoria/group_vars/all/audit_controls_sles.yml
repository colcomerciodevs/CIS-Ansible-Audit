  - id: CIS-5.1.3
    name: "Ensure permissions on /etc/cron.hourly are configured"
    os_scope: [SLES]
    command: "stat -Lc '%a %U %G' /etc/cron.hourly | grep -Eq '^(700|755) root root$' && echo PASS || echo FAIL"
    pass_if_regex: ["PASS"]
    fail_if_regex: ["FAIL"]

  - id: CIS-5.1.4
    name: "Ensure permissions on /etc/cron.daily are configured"
    os_scope: [SLES]
    command: "stat -Lc '%a %U %G' /etc/cron.daily | grep -Eq '^(700|755) root root$' && echo PASS || echo FAIL"
